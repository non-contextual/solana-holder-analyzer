<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Transfer Investigation</title>
<style>
@font-face { font-family: "Space Grotesk"; font-style: normal; font-weight: 300 700; font-display: swap; src: url("/fonts/space-grotesk-latin.woff2") format("woff2"); unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
@font-face { font-family: "Space Grotesk"; font-style: normal; font-weight: 300 700; font-display: swap; src: url("/fonts/space-grotesk-latin-ext.woff2") format("woff2"); unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF; }
@font-face { font-family: "JetBrains Mono"; font-style: normal; font-weight: 300 600; font-display: swap; src: url("/fonts/jetbrains-mono-latin.woff2") format("woff2"); unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }
@font-face { font-family: "JetBrains Mono"; font-style: normal; font-weight: 300 600; font-display: swap; src: url("/fonts/jetbrains-mono-latin-ext.woff2") format("woff2"); unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF; }
</style>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  input:focus-visible, textarea:focus-visible { outline: none; border-color: var(--accent); }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; scroll-behavior: auto !important; }
  }
  /* Dark scrollbars matching the surface ramp (Firefox + WebKit). */
  html { scrollbar-color: var(--hairline) var(--bg); scrollbar-width: thin; }
  *::-webkit-scrollbar { width: 8px; height: 8px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: var(--hairline); border-radius: 0; }
  *::-webkit-scrollbar-thumb:hover { background: var(--hairline-2); }
  *::-webkit-scrollbar-corner { background: var(--bg); }
  :root {
    /* Non Design System */
    --bg:          #0A0A0A;
    --panel:       #0F0F0F;
    --panel-2:     #141414;
    --panel-3:     #1A1A1A;
    --ink:         #F5F5F5;
    --ink-2:       rgba(245, 245, 245, 0.62);
    --ink-3:       rgba(245, 245, 245, 0.40);
    --ink-4:       rgba(245, 245, 245, 0.22);
    --ink-5:       rgba(245, 245, 245, 0.10);
    --hairline:    rgba(245, 245, 245, 0.14);
    --hairline-2:  rgba(245, 245, 245, 0.08);
    --grid:        rgba(245, 245, 245, 0.04);
    --signal:      #C5FF4A;
    --signal-dim:  rgba(197, 255, 74, 0.30);
    --alert:       #FF5C5C;
    --alert-dim:   rgba(255, 92, 92, 0.30);
    --font-body:   "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
    --font-mono:   "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
    /* data colours — semantic chart encoding only */
    --data-green:  #5DD49A;
    --data-blue:   #6B9BFF;
    /* backwards-compat aliases */
    --surface:   var(--panel);
    --surface-2: var(--panel-2);
    --border:    var(--hairline);
    --border-2:  var(--hairline-2);
    --text:      var(--ink);
    --muted:     var(--ink-2);
    --subtle:    var(--ink-3);
    --accent:    var(--signal);
    --red:       var(--alert);
    --mint:      var(--data-green);
    --blue:      var(--data-blue);
    --font-data: var(--font-mono);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; }
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* Header */
  header { border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 16px; background: var(--surface); flex-shrink: 0; }
  .logo { font-family: var(--font-mono); font-size: 13px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
  .logo-sep { color: var(--subtle); margin: 0 4px; }
  .header-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  a.back-link { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); text-decoration: none; border: 1px solid var(--border); padding: 4px 10px; }
  a.back-link:hover { color: var(--text); border-color: var(--border-2); }

  /* ── Mobile (≤640px): stack header + form, tighten gutters ── */
  @media (max-width: 640px) {
    header { flex-wrap: wrap; padding: 12px 16px; row-gap: 8px; }
    .header-actions { width: 100%; margin-left: 0; }
    .settings { padding: 16px 16px; gap: 12px; }
    .settings .field { width: 100%; }
    .settings textarea { width: 100%; min-width: 0; }
    .settings .field:has(input[type="number"]),
    .settings .field:has(.depth-group),
    .settings .field:has(input[type="date"]) { width: auto; flex: 0 1 auto; }
    .settings .btn-primary { margin-left: auto; }
  }

  /* Settings */
  .settings { padding: 16px 24px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; flex-shrink: 0; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .label { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  textarea { font-family: var(--font-data); font-size: 12px; background: var(--bg); border: 1px solid var(--border-2); color: var(--text); padding: 8px 10px; outline: none; border-radius: 0; resize: vertical; min-height: 80px; width: 360px; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--subtle); }
  input[type="number"], input[type="date"] { font-family: var(--font-data); font-size: 12px; background: var(--bg); border: 1px solid var(--border-2); color: var(--text); padding: 7px 8px; outline: none; border-radius: 0; }
  input[type="number"] { width: 70px; -moz-appearance: textfield; }
  input[type="number"]::-webkit-inner-spin-button,
  input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="date"]   { width: 140px; color-scheme: dark; }
  input:focus { border-color: var(--accent); }

  .depth-group { display: flex; gap: 0; border: 1px solid var(--border); }
  .depth-btn { font-family: var(--font-mono); font-size: 11px; font-weight: 600; padding: 7px 14px; border: none; background: transparent; color: var(--muted); cursor: pointer; border-radius: 0; }
  .depth-btn + .depth-btn { border-left: 1px solid var(--border); }
  .depth-btn.active { background: var(--ink); color: var(--bg); }

  button.btn-primary { font-family: var(--font-mono); font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; background: var(--ink); color: var(--bg); border: none; padding: 9px 22px; cursor: pointer; border-radius: 0; }
  button.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Body */
  .body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Progress */
  .progress-section { padding: 16px 24px; border-bottom: 1px solid var(--border); display: none; flex-shrink: 0; }
  .progress-section.visible { display: block; }
  .log { font-family: var(--font-data); font-size: 11px; color: var(--muted); line-height: 1.9; max-height: 140px; overflow-y: auto; }
  .log-line { display: block; }
  .log-layer { color: var(--accent); font-weight: 500; }
  .log-done  { color: var(--mint); }
  .log-error { color: var(--red); }

  /* Graph area */
  .graph-area { flex: 1; display: none; flex-direction: column; overflow: hidden; }
  .graph-area.visible { display: flex; }

  /* Controls */
  .controls { display: flex; align-items: center; gap: 10px; padding: 10px 24px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; flex-wrap: wrap; }
  .ctrl-label { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--subtle); }
  .token-chip { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 3px 9px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; border-radius: 0; }
  .token-chip.active { border-color: var(--signal); color: var(--signal); background: transparent; }
  .view-toggle { display: flex; border: 1px solid var(--border); margin-left: auto; }
  .view-btn { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 5px 14px; border: none; background: transparent; color: var(--muted); cursor: pointer; }
  .view-btn.active { background: var(--ink); color: var(--bg); }

  /* Date slider */
  .slider-bar { padding: 10px 24px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .slider-labels { display: flex; justify-content: space-between; font-family: var(--font-data); font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .slider-wrap { position: relative; height: 20px; margin: 0 8px; }
  .slider-track { position: absolute; top: 8px; left: 0; right: 0; height: 4px; background: var(--border); border-radius: 2px; }
  .slider-fill  { position: absolute; top: 8px; height: 4px; background: var(--accent); border-radius: 2px; }
  .slider-range { position: absolute; width: 100%; height: 20px; top: 0; appearance: none; background: transparent; pointer-events: none; outline: none; }
  .slider-range::-webkit-slider-thumb { appearance: none; pointer-events: auto; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); cursor: grab; z-index: 2; position: relative; }
  .slider-cur { display: flex; justify-content: center; gap: 8px; font-family: var(--font-data); font-size: 11px; color: var(--muted); margin-top: 4px; }
  .slider-cur span { color: var(--accent); }

  /* D3 graph */
  .svg-wrap { flex: 1; overflow: hidden; position: relative; }
  .svg-wrap svg { width: 100%; height: 100%; }
  .node circle { stroke-width: 1.5px; cursor: pointer; transition: r 160ms cubic-bezier(.34,1.56,.64,1), fill-opacity 160ms ease; transform-box: fill-box; transform-origin: center; }
  .node:hover circle { filter: drop-shadow(0 0 6px rgba(245,166,35,0.45)); }
  .node text { font-family: var(--font-data); font-size: 10px; fill: var(--muted); pointer-events: none; transition: fill 160ms ease; }
  .node:hover text { fill: var(--text); }
  .node.selected circle { stroke: var(--accent) !important; stroke-width: 2.4 !important; filter: drop-shadow(0 0 8px rgba(245,166,35,0.7)); }
  .link { stroke-opacity: 0.6; fill: none; transition: stroke-opacity 200ms ease, stroke-width 200ms ease; }
  .link.dim { stroke-opacity: 0.08; }
  .link.bright { stroke-opacity: 0.95; }
  /* Subtle seed pulse so the eye finds the entry points. Pure CSS, no JS. */
  @keyframes seedPulse {
    0%, 100% { filter: drop-shadow(0 0 0 rgba(245,166,35,0)); }
    50%      { filter: drop-shadow(0 0 8px rgba(245,166,35,0.6)); }
  }
  .node.seed circle { animation: seedPulse 2.4s ease-in-out infinite; }
  .tooltip { position: absolute; background: var(--surface); border: 1px solid var(--border); padding: 8px 12px; font-family: var(--font-data); font-size: 11px; color: var(--text); pointer-events: none; z-index: 10; max-width: 240px; line-height: 1.6; }

  /* Net flow table */
  .table-wrap { flex: 1; overflow: auto; display: none; }
  .table-wrap.visible { display: block; }
  .flow-table { width: 100%; border-collapse: collapse; min-width: 600px; }
  .flow-table th { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 14px; text-align: left; font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .flow-table td { padding: 8px 14px; border-bottom: 1px solid var(--border); font-family: var(--font-data); font-size: 12px; white-space: nowrap; }
  .flow-table tr:hover td { background: var(--surface); }
  .pos { color: var(--mint); } .neg { color: var(--red); } .zero { color: var(--subtle); }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

  /* Suspects table */
  .suspects-wrap { flex: 1; overflow: auto; display: none; padding: 16px 24px; }
  .suspects-wrap.visible { display: block; }
  .suspect-card { background: var(--surface); border: 1px solid var(--border); margin-bottom: 8px; padding: 12px 16px; display: flex; gap: 16px; align-items: center; }
  .suspect-addr { font-family: var(--font-data); font-size: 12px; color: var(--text); flex: 0 0 auto; }
  .suspect-reason { font-family: var(--font-data); font-size: 11px; color: var(--muted); flex: 1; }
  .suspect-score { font-family: var(--font-mono); font-size: 11px; color: var(--signal); border: 1px solid var(--signal-dim); background: transparent; padding: 2px 8px; flex: 0 0 auto; }
  .suspect-metrics { font-family: var(--font-data); font-size: 11px; color: var(--muted); flex: 1; }
  .okx-dot { position: absolute; top: -2px; right: -2px; width: 6px; height: 6px; border-radius: 50%; background: var(--mint); border: 1px solid var(--bg); }
  .node-wrap { position: relative; display: inline-block; }

  /* Stats */
  .stats { padding: 8px 24px; background: var(--surface); border-top: 1px solid var(--border); font-family: var(--font-data); font-size: 11px; color: var(--muted); display: flex; gap: 20px; flex-shrink: 0; }
  .stats b { color: var(--text); }

  /* Empty */
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); }
  .empty-icon { font-family: var(--font-mono); font-size: 22px; color: var(--subtle); }
  .empty-title { font-family: var(--font-mono); font-size: 13px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .empty-sub { font-size: 13px; color: var(--subtle); text-align: center; max-width: 380px; }

  /* History panel items (referenced in loadTransferHistory HTML) */
  .hist-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .hist-item:hover { background: var(--surface-2); }
  .hist-meta { flex: 1; min-width: 0; }
  .hist-time { font-family: var(--font-mono); font-size: 11px; color: var(--text); font-weight: 500; }
  .hist-sub  { font-family: var(--font-data); font-size: 11px; color: var(--muted); margin-top: 2px; }
  .hist-del  { font-family: var(--font-mono); font-size: 11px; color: var(--subtle); background: none; border: none; cursor: pointer; padding: 2px 4px; flex-shrink: 0; }
  .hist-del:hover { color: var(--red); }
  .hist-empty { padding: 20px; text-align: center; font-family: var(--font-mono); font-size: 11px; color: var(--subtle); letter-spacing: 0.06em; }

  /* Node detail panel (slides in from right on click) */
  .node-detail { position: absolute; top: 0; right: 0; bottom: 0; width: 380px; background: var(--surface); border-left: 1px solid var(--border); padding: 16px; overflow-y: auto; display: none; z-index: 20; font-family: var(--font-data); font-size: 12px; }
  .node-detail.visible { display: block; }
  .node-detail-addr { font-family: var(--font-data); font-size: 11px; color: var(--text); word-break: break-all; margin-bottom: 10px; }
  .node-detail-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .node-detail-label { color: var(--muted); font-size: 11px; }
  .node-detail-val { color: var(--text); font-size: 11px; text-align: right; }
  .node-detail-close { position: absolute; top: 8px; right: 10px; background: none; border: none; color: var(--subtle); cursor: pointer; font-size: 14px; padding: 2px 6px; }
  .node-detail-close:hover { color: var(--text); }
  .node-detail-copy { font-family: var(--font-mono); font-size: 9px; color: var(--muted); border: 1px solid var(--border); background: none; cursor: pointer; padding: 2px 6px; margin-left: 6px; }
  .node-detail-copy:hover { color: var(--text); }

  /* Token-chain panel: per-seed time-ordered transfer log between seed and clicked addr. */
  .chain-section { margin-top: 14px; }
  .chain-header { font-family: var(--font-mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; padding: 6px 0; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .chain-header .chain-count { color: var(--subtle); }
  .chain-empty { font-size: 11px; color: var(--subtle); padding: 8px 0; font-style: italic; }
  .chain-row { display: grid; grid-template-columns: 64px 14px 1fr auto; gap: 6px; padding: 5px 0; border-bottom: 1px solid var(--border); align-items: baseline; font-size: 11px; }
  .chain-row:last-child { border-bottom: none; }
  .chain-time { color: var(--subtle); font-size: 10px; font-family: var(--font-data); }
  .chain-arrow { color: var(--muted); font-size: 13px; text-align: center; }
  .chain-arrow.in { color: var(--mint); }
  .chain-arrow.out { color: var(--accent); }
  .chain-tok { color: var(--text); }
  .chain-amt { color: var(--text); font-variant-numeric: tabular-nums; font-size: 10px; }
  .chain-usd { color: var(--subtle); font-size: 10px; margin-left: 4px; }
  .chain-tx-link { color: var(--subtle); text-decoration: none; font-family: var(--font-mono); font-size: 9px; }
  .chain-tx-link:hover { color: var(--accent); }
  .chain-hop { background: var(--surface-2); padding: 4px 8px; margin: 6px 0; font-size: 10px; color: var(--muted); border-left: 2px solid var(--blue); }
  .chain-badge { font-family: var(--font-mono); font-size: 9px; padding: 1px 5px; border: 1px solid; margin-left: 6px; letter-spacing: 0.02em; }

  /* Sidebar section dividers — group flat rows into scannable cards. */
  .detail-section { margin-top: 14px; }
  .detail-section-head { font-family: var(--font-mono); font-size: 9.5px; color: var(--subtle);
                         letter-spacing: 0.1em; text-transform: uppercase; padding: 0 0 6px;
                         border-bottom: 1px solid var(--border); margin-bottom: 6px; }
  .detail-section-head .detail-section-extra { color: var(--muted); float: right; font-weight: 400; }
  .detail-more { margin-top: 8px; }
  .detail-more > summary { cursor: pointer; font-family: var(--font-mono); font-size: 10px;
                           color: var(--muted); letter-spacing: 0.06em; padding: 4px 0;
                           list-style: none; user-select: none; }
  .detail-more > summary::-webkit-details-marker { display: none; }
  .detail-more > summary::before { content: '▸ '; color: var(--subtle); }
  .detail-more[open] > summary::before { content: '▾ '; color: var(--subtle); }
  .detail-more[open] > summary { color: var(--text); }

  /* Edge-click panel pieces. Reuses .node-detail container so the slide-in
     position is consistent with node clicks. Header shows direction + mint. */
  .edge-head { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .edge-pair { display: flex; align-items: center; gap: 6px; font-family: var(--font-data); font-size: 11px; word-break: break-all; }
  .edge-pair .edge-arrow { color: var(--accent); font-size: 14px; flex-shrink: 0; }
  .edge-pair .edge-addr  { color: var(--text); }
  .edge-summary { display: grid; grid-template-columns: auto auto; gap: 4px 12px;
                  padding: 6px 0; border-top: 1px solid var(--border);
                  border-bottom: 1px solid var(--border);
                  font-family: var(--font-data); font-size: 11px; }
  .edge-summary .es-k { color: var(--muted); font-size: 10px; }
  .edge-summary .es-v { color: var(--text); text-align: right; font-variant-numeric: tabular-nums; }

  /* Recap bar — replaces the full settings form once a scan is loaded so the
     graph gets the vertical space it deserves. Click anywhere on it to expand
     the form back for editing or a new scan. */
  .settings-recap { display: none; align-items: center; gap: 12px; padding: 8px 24px;
                    background: var(--surface); border-bottom: 1px solid var(--border);
                    font-family: var(--font-data); font-size: 12px; cursor: pointer;
                    color: var(--muted); flex-shrink: 0; }
  .settings-recap.visible { display: flex; }
  .settings-recap:hover { background: var(--surface-2); }
  .recap-tag { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.1em;
               text-transform: uppercase; color: var(--signal); padding: 2px 6px;
               border: 1px solid var(--signal-dim); background: transparent; }
  .recap-seed { color: var(--text); font-weight: 500; }
  .recap-sep  { color: var(--subtle); }
  .recap-edit { margin-left: auto; font-family: var(--font-mono); font-size: 10px;
                color: var(--muted); border: 1px solid var(--border); background: transparent;
                padding: 4px 12px; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; }
  .recap-edit:hover { color: var(--text); border-color: var(--border-2); }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1 class="logo">transfer<span class="logo-sep">/</span>investigation</h1>
    <nav class="header-actions" aria-label="Primary">
      <div style="position:relative">
        <button id="btnTransferHistory" class="back-link" style="cursor:pointer;background:none;font-family:var(--font-mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:4px 10px" onclick="toggleTransferHistory()">History ▾</button>
        <div id="transferHistoryPanel" style="display:none;position:absolute;top:100%;right:0;margin-top:4px;background:var(--surface);border:1px solid var(--border-2);min-width:320px;max-height:340px;overflow-y:auto;z-index:300"></div>
      </div>
      <button id="btnSaveScan" style="display:none;cursor:pointer;background:none;font-family:var(--font-mono);font-size:11px;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:4px 10px" onclick="saveScan()">Save Scan</button>
      <a class="back-link" href="/">← token analyzer</a>
    </nav>
  </header>

  <!-- Recap bar: shows after a scan loads. Collapses the wide form into a
       single thin row so the graph below has more vertical space. Click to expand. -->
  <div class="settings-recap" id="settingsRecap" onclick="expandSettings()" title="点击展开参数面板，可以修改或重新扫描">
    <span class="recap-tag">已加载</span>
    <span class="recap-seed" id="recapSeed">—</span>
    <span class="recap-sep">·</span>
    <span id="recapRange">—</span>
    <span class="recap-sep">·</span>
    <span id="recapDepth">—</span>
    <button class="recap-edit" onclick="event.stopPropagation(); expandSettings()">编辑 / 重新扫描</button>
  </div>

  <!-- Settings -->
  <div class="settings" id="settingsPanel">
    <div class="field">
      <span class="label">Wallet Addresses (one per line)</span>
      <textarea id="walletInput" placeholder="Paste wallet addresses here, one per line…" spellcheck="false"></textarea>
    </div>
    <div class="field">
      <span class="label">Depth</span>
      <div class="depth-group">
        <button class="depth-btn active" data-d="1" onclick="setDepth(1)">1</button>
        <button class="depth-btn"        data-d="2" onclick="setDepth(2)">2</button>
        <button class="depth-btn"        data-d="3" onclick="setDepth(3)">3</button>
      </div>
    </div>
    <div class="field">
      <span class="label">Expand / layer</span>
      <input type="number" id="expandInput" value="15" min="1" max="30" />
    </div>
    <div class="field">
      <span class="label">From</span>
      <input type="date" id="fromInput" />
    </div>
    <div class="field">
      <span class="label">To</span>
      <input type="date" id="toInput" />
    </div>
    <div class="field">
      <span class="label">Min $ Value</span>
      <input type="number" id="minUsdInput" value="0" min="0" step="1" style="width:70px" title="Hide edges below this USD value" oninput="if(scanGraph)renderCurrent()" />
    </div>
    <button class="btn-primary" id="btnScan" onclick="startScan()">Start Scan</button>
    <button id="btnAbort" onclick="abortScan()" style="display:none;font-family:var(--font-mono);font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;background:transparent;color:var(--red);border:1px solid var(--red);padding:9px 18px;cursor:pointer;border-radius:0">Abort</button>
  </div>

  <main class="body">
    <!-- Empty state -->
    <div class="empty" id="emptyState">
      <div class="empty-icon">//</div>
      <h2 class="empty-title">No Investigation Yet</h2>
      <div class="empty-sub">Paste wallet addresses above, set a time range and depth, then click Start Scan.</div>
    </div>

    <!-- Progress log -->
    <div class="progress-section" id="progressSection">
      <div class="log" id="scanLog"></div>
    </div>

    <!-- Graph + controls -->
    <div class="graph-area" id="graphArea">
      <div class="controls">
        <span class="ctrl-label">Token</span>
        <div id="tokenChips" style="display:flex;gap:6px;flex-wrap:wrap"></div>
        <button id="btnShowExt" onclick="toggleExternal()" style="font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.04em;padding:3px 10px;border:1px solid var(--border);background:transparent;color:var(--subtle);cursor:pointer;flex-shrink:0" title="是否显示只被一两笔转账连到的外部钱包">外部节点 关</button>
        <button id="btnHideUnpriced" onclick="toggleUnpriced()" style="font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:0.04em;padding:3px 10px;border:1px solid var(--border);background:transparent;color:var(--subtle);cursor:pointer;flex-shrink:0" title="隐藏没有 DexScreener 价格的代币（多数是 spam 空投）">spam 代币 隐藏</button>
        <input id="addrSearch" type="text" placeholder="搜索地址前缀..." oninput="onAddrSearch()" style="font-family:var(--font-data);font-size:11px;padding:3px 10px;border:1px solid var(--border);background:var(--surface);color:var(--text);width:160px;flex-shrink:0;outline:none" title="输入地址前缀或子串，会高亮匹配的节点" />
        <span id="addrSearchBadge" style="font-family:var(--font-mono);font-size:10px;color:var(--subtle);flex-shrink:0"></span>
        <div class="view-toggle">
          <button class="view-btn active" id="btnViewGraph"    onclick="setView('graph')">Graph</button>
          <button class="view-btn"        id="btnViewTable"    onclick="setView('table')">Net Flow</button>
          <button class="view-btn"        id="btnViewSuspects" onclick="setView('suspects')" style="display:none">Suspects <span id="suspectsBadge" style="background:transparent;border:1px solid var(--signal-dim);color:var(--signal);padding:1px 5px;font-size:9px;margin-left:4px"></span></button>
        </div>
      </div>

      <div class="slider-bar">
        <div class="slider-labels">
          <span id="lblMin">—</span>
          <span style="font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;color:var(--subtle)">TIME RANGE FILTER</span>
          <span id="lblMax">—</span>
        </div>
        <div class="slider-wrap">
          <div class="slider-track"></div>
          <div class="slider-fill" id="sliderFill"></div>
          <input type="range" class="slider-range" id="rangeS" min="0" max="100" value="0"   oninput="onSlider()" />
          <input type="range" class="slider-range" id="rangeE" min="0" max="100" value="100" oninput="onSlider()" />
        </div>
        <div class="slider-cur"><span id="curS">—</span> → <span id="curE">—</span></div>
      </div>

      <div class="svg-wrap" id="svgWrap" style="position:relative">
        <svg id="mainSvg"></svg>
        <div class="tooltip" id="tooltip" style="display:none"></div>
        <!-- Node detail panel: appears on node click -->
        <div class="node-detail" id="nodeDetail">
          <button class="node-detail-close" onclick="closeNodeDetail()">✕</button>
          <div id="nodeDetailContent"></div>
        </div>
      </div>
      <div class="table-wrap" id="tableWrap">
        <table class="flow-table"><thead id="flowHead"></thead><tbody id="flowBody"></tbody></table>
      </div>
      <div class="suspects-wrap" id="suspectsWrap">
        <div id="suspectsBody"></div>
      </div>

      <div class="stats">
        节点 <b id="sNodes">—</b> &nbsp;
        边 <b id="sEdges">—</b> &nbsp;
        转账 <b id="sTx">—</b> &nbsp;
        已扫描钱包 <b id="sScanned">—</b>
      </div>
    </div>
  </main>

</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let scanGraph   = null    // final TransferGraph (from scan_graph event)
let scanSrc     = null
let scanDepth   = 1
let hotWallets  = new Set()   // addresses auto-classified as high-fan-out (skip-expand)
let sliderMin   = 0
let sliderMax   = 0
let filterMints = new Set()
let showExternal = false   // external ghost nodes hidden by default (huge perf win)
let hideUnpriced = true    // hide edges with no DexScreener price (spam dust filter); on by default
let suspectsSet  = new Set()  // for O(1) lookup during render
let currentView = 'graph'
let okxDataMap   = new Map()  // address → WalletOkxData
let suspects     = []
let tokenPrices  = new Map()  // mint → { price, liquidity, symbol }
let walletIntel  = new Map()  // address → WalletIntelligence (entity labels + behavior)
let currentScanWallets = []   // seed wallets used for current scan (for save)

// Label colors for entity types
const ENTITY_COLORS = {
  cex:        '#6B9BFF',   // blue — exchange
  bridge:     '#A78BFA',   // purple — cross-chain bridge
  mixer:      '#FF5C5C',   // alert — mixer
  sanctioned: '#FF5C5C',   // alert — sanctioned
  protocol:   '#5DD49A',   // green — known protocol
  whale:      '#C5FF4A',   // signal — known whale
  bot:        '#C5FF4A',   // signal — bot/automation
}

function entityColor(type) { return ENTITY_COLORS[type] ?? 'rgba(245,245,245,0.40)' }
function entityBadge(intel) {
  if (!intel) return ''
  const label = intel.staticLabel
  if (label) return `<span style="font-family:var(--font-mono);font-size:9px;padding:1px 5px;border:1px solid;border-color:${entityColor(label.type)}40;color:${entityColor(label.type)};background:${entityColor(label.type)}18;margin-left:4px">${label.name}</span>`
  const tag = intel.behaviorTags[0]
  if (tag === 'cex-like') return `<span style="font-family:var(--font-mono);font-size:9px;padding:1px 5px;border:1px solid rgba(107,155,255,0.30);color:#6B9BFF;background:transparent;margin-left:4px">CEX?</span>`
  if (tag === 'mixer-like') return `<span style="font-family:var(--font-mono);font-size:9px;padding:1px 5px;border:1px solid rgba(255,92,92,0.30);color:#FF5C5C;background:transparent;margin-left:4px">MIXER?</span>`
  if (tag === 'high-fan-out') return `<span style="font-family:var(--font-mono);font-size:9px;padding:1px 5px;border:1px solid rgba(197,255,74,0.30);color:#C5FF4A;background:transparent;margin-left:4px">scatter</span>`
  return ''
}

// Target token context — set from URL params when launched from the main analyzer
const _urlParams  = new URLSearchParams(window.location.search)
const targetMint  = _urlParams.get('mint')  || null
const targetPrice = parseFloat(_urlParams.get('price') || '0') || 0

const LAYER_COLORS = ['#C5FF4A', '#6B9BFF', '#5DD49A', '#8C8C8A', '#5A5A58']
const TOKEN_COLORS = { SOL: '#C5FF4A', USDC: '#6B9BFF', USDT: '#5DD49A' }

// Init default dates: last 30 days
;(function() {
  const to   = new Date()
  const from = new Date(to - 30 * 86400_000)
  const fmt  = d => d.toISOString().slice(0, 10)
  document.getElementById('fromInput').value = fmt(from)
  document.getElementById('toInput').value   = fmt(to)
})()

// ── Settings ──────────────────────────────────────────────────────────────────
function setDepth(d) {
  scanDepth = d
  document.querySelectorAll('.depth-btn').forEach(b => b.classList.toggle('active', +b.dataset.d === d))
}

// ── Scan ──────────────────────────────────────────────────────────────────────
// Solana addresses are base58, 32–44 chars. Reject pasted junk early so we
// don't pay for a server round-trip to find out the input was a paragraph
// of text or a CSV with column headers.
const BASE58_RE = /^[1-9A-HJ-NP-Za-km-z]{32,44}$/
function startScan() {
  const raw = document.getElementById('walletInput').value.trim()
  if (!raw) { alert('Enter at least one wallet address.'); return }
  // Pre-filter tokens that are obviously not addresses (too short to ever match
  // base58 32-44). This keeps the "X invalid entries" warning focused on
  // address-shaped strings the user probably meant to paste — not every word
  // of a sentence they accidentally dropped in.
  const candidates = raw.split(/[\n,\s]+/).map(w => w.trim()).filter(w => w.length >= 30)
  const wallets    = candidates.filter(w => BASE58_RE.test(w))
  const invalid    = candidates.filter(w => !BASE58_RE.test(w))
  if (!wallets.length) {
    alert(invalid.length ? `No valid Solana addresses found.\n\nFirst offender:\n${invalid[0].slice(0,60)}` : 'No valid addresses found.')
    return
  }
  if (invalid.length) {
    if (!confirm(`${invalid.length} entry/entries don't look like Solana addresses and will be skipped:\n\n${invalid.slice(0,3).map(s=>s.slice(0,40)).join('\n')}${invalid.length>3?'\n…':''}\n\nContinue with ${wallets.length} valid?`)) return
  }

  if (scanSrc) { scanSrc.close(); scanSrc = null }
  scanGraph = null; okxDataMap = new Map(); suspects = []; tokenPrices = new Map(); walletIntel = new Map(); hotWallets = new Set()

  document.getElementById('emptyState').style.display   = 'none'
  document.getElementById('progressSection').classList.add('visible')
  document.getElementById('graphArea').classList.remove('visible')
  document.getElementById('btnViewSuspects').style.display = 'none'
  document.getElementById('suspectsBody').innerHTML = ''
  document.getElementById('scanLog').innerHTML = ''
  document.getElementById('btnScan').disabled = true
  document.getElementById('btnAbort').style.display = ''
  document.getElementById('btnSaveScan')?.setAttribute('style', 'display:none')

  const from   = Math.floor(new Date(document.getElementById('fromInput').value).getTime() / 1000)
  const to     = Math.floor(new Date(document.getElementById('toInput').value).getTime()   / 1000) + 86399
  const expand = parseInt(document.getElementById('expandInput').value) || 15

  currentScanWallets = wallets
  let qs = `wallets=${encodeURIComponent(wallets.join(','))}&from=${from}&to=${to}&depth=${scanDepth}&expand=${expand}`
  if (targetMint) qs += `&targetMint=${encodeURIComponent(targetMint)}`
  const es  = new EventSource(`/api/transfers?${qs}`)
  scanSrc   = es

  es.onmessage = e => { try { handleEvent(JSON.parse(e.data)) } catch {} }
  es.onerror   = () => {
    log('⚠ Connection closed.', 'log-error')
    document.getElementById('btnScan').disabled = false
    document.getElementById('btnAbort').style.display = 'none'
    es.close(); scanSrc = null
  }
}

// Tear down the active EventSource. The server detects the abort via the
// request signal and stops fetching new Helius pages — no more wasted RPC
// calls after the user changes their mind.
function abortScan() {
  if (!scanSrc) return
  scanSrc.close(); scanSrc = null
  log('⨯ Scan aborted.', 'log-error')
  document.getElementById('btnScan').disabled = false
  document.getElementById('btnAbort').style.display = 'none'
}

function log(msg, cls = '') {
  const el   = document.getElementById('scanLog')
  const line = document.createElement('span')
  line.className = `log-line ${cls}`
  line.textContent = msg
  el.appendChild(line)
  el.appendChild(document.createElement('br'))
  el.scrollTop = el.scrollHeight
}

function handleEvent(ev) {
  if (ev.type === 'scan_layer') {
    log(`▶ Layer ${ev.layer}: ${ev.total} wallet${ev.total !== 1 ? 's' : ''}`, 'log-layer')
  } else if (ev.type === 'scan_wallet') {
    if (ev.done === ev.total) log(`  ✓ Layer ${ev.layer} complete (${ev.total} scanned)`, 'log-done')
  } else if (ev.type === 'scan_expand') {
    log(`  + Discovered ${ev.discovered} addresses → expanding top ${ev.newCount} into layer ${ev.layer + 1}`)
  } else if (ev.type === 'scan_hot') {
    // High-fan-out wallet (CEX / MM / router etc.): kept in graph, but not used
    // to seed the next BFS layer. Saves a handful of Helius pages per offender.
    hotWallets.add(ev.address)
    const tag = ev.cappedPages ? ' · page-capped' : ''
    log(`  ⊘ Skip-expand ${ev.address.slice(0,8)}… layer=${ev.layer} cps=${ev.counterparties}${tag}`)
  } else if (ev.type === 'scan_partial') {
    // Log-only during scan; graph renders only after scan_graph
    log(`  … ${ev.nodes.length} nodes tracked so far`)
  } else if (ev.type === 'scan_graph') {
    scanGraph = ev.graph
    log(`✓ Done — ${ev.graph.nodes.length} nodes, ${ev.graph.transfers.length} transfers`, 'log-done')
    document.getElementById('btnScan').disabled = false
    document.getElementById('btnAbort').style.display = 'none'
    document.getElementById('btnSaveScan').style.display = ''
    initView()
  } else if (ev.type === 'wallet_intel') {
    walletIntel = new Map(Object.entries(ev.intel))
    const flagged = [...walletIntel.values()].filter(w => w.riskScore > 40).length
    if (flagged > 0) log(`  ⚠ Wallet intelligence: ${flagged} addresses flagged (CEX/bridge/mixer/bot)`)
    if (currentView === 'graph') renderGraph()   // re-render with labels
  } else if (ev.type === 'scan_prices') {
    tokenPrices = new Map(Object.entries(ev.prices))
    log(`  ✓ Prices: ${tokenPrices.size} tokens priced via DexScreener`)
    if (currentView === 'graph') renderGraph()
  } else if (ev.type === 'wallet_okx') {
    okxDataMap.set(ev.data.address, ev.data)
    log(`  ↳ OKX ${ev.data.address.slice(0,8)}… $${fmtN(ev.data.portfolioUsd)}${ev.data.targetTokenUsd ? ` · target $${fmtN(ev.data.targetTokenUsd)}` : ''}`)
    // Re-render so the green OKX stroke shows up immediately; without this
    // the user only sees the indicator after toggling a filter.
    if (currentView === 'graph' && scanGraph) renderGraph()
  } else if (ev.type === 'scan_suspects') {
    suspects    = ev.suspects
    suspectsSet = new Set(ev.suspects.map(s => s.address))
    document.getElementById('btnViewSuspects').style.display = ''
    document.getElementById('suspectsBadge').textContent = ev.suspects.length
    log(`⚠ ${ev.suspects.length} suspect wallet${ev.suspects.length !== 1 ? 's' : ''} flagged`, 'log-done')
    renderSuspects()
  } else if (ev.type === 'scan_error') {
    log(`⚠ ${ev.message}`, 'log-error')
    document.getElementById('btnScan').disabled = false
  }
}

// ── Initialize after full scan ────────────────────────────────────────────────
function initView() {
  const g = scanGraph
  sliderMin = g.timeRange.min; sliderMax = g.timeRange.max
  document.getElementById('lblMin').textContent = fmtDate(sliderMin * 1000)
  document.getElementById('lblMax').textContent = fmtDate(sliderMax * 1000)
  document.getElementById('rangeS').value = '0'
  document.getElementById('rangeE').value = '100'
  updateSlider()
  // Sync filter-toggle button styling with their current state — without this
  // the spam-token filter starts engaged but its button looks identical to the
  // unengaged external-nodes one, so the user can't tell what's on.
  applyToggleStyle(document.getElementById('btnShowExt'),     showExternal)
  applyToggleStyle(document.getElementById('btnHideUnpriced'), hideUnpriced)

  // Token chips sorted by USD volume
  const mintUsd = new Map()
  for (const e of g.edges) mintUsd.set(e.mint, (mintUsd.get(e.mint) ?? 0) + (e.usdScore ?? 0))
  const topMints = [...mintUsd.entries()].sort((a,b) => b[1]-a[1]).slice(0,12).map(([m]) => m)
  const defaultActive = g.targetMint ? new Set([g.targetMint]) : new Set(topMints)

  const chips = document.getElementById('tokenChips')
  chips.innerHTML = ''
  // Native SOL and wSOL render under the same symbol; dedupe so we don't show
  // two identical-looking chips. The first one wins and its dataset.mint still
  // identifies the underlying mint precisely for filtering.
  const seenSymbols = new Set()
  for (const m of topMints) {
    const info = tokenPrices.get(m)
    const sym  = symbolForMint(m)
    if (seenSymbols.has(sym)) continue
    seenSymbols.add(sym)
    // Price tag:
    //   - Stables → $1.00 (DexScreener fetch skips them so info is always undefined)
    //   - Sub-cent token → scientific notation with lowercase e (avoid the
    //     uppercase "$6.50E-6" look) but kept tight enough to fit on a chip
    //   - Real prices → fmtN with normal precision
    //   - Missing info & not stable → no tag (rather than fake $0)
    let tag = ''
    if (STABLE_MINTS_FE.has(m)) {
      tag = ' $1.00'
    } else if (info) {
      tag = ' ' + fmtPrice(info.price)
    }
    const chip = document.createElement('button')
    chip.className = `token-chip${defaultActive.has(m) ? ' active' : ''}`
    // dataset.mint is the underlying identity — used for filterMints set, edge keys, copy actions.
    // The visible text is symbol; the title is the full mint for hover-reveal.
    chip.dataset.mint = m; chip.textContent = sym + tag; chip.title = m
    chip.onclick = () => {
      chip.classList.toggle('active')
      filterMints = new Set([...document.querySelectorAll('.token-chip.active')].map(c => c.dataset.mint))
      renderCurrent()
    }
    chips.appendChild(chip)
  }
  filterMints = defaultActive

  document.getElementById('sNodes').textContent   = g.nodes.length
  document.getElementById('sEdges').textContent   = g.edges.length
  document.getElementById('sTx').textContent      = g.transfers.length
  document.getElementById('sScanned').textContent = g.nodes.filter(n => n.layer <= scanDepth).length

  // Hide the welcome empty-state — fixes the bug where loading from history
  // left the "// NO INVESTIGATION YET" placeholder sitting on top of the actual graph.
  document.getElementById('emptyState').style.display = 'none'
  document.getElementById('progressSection').classList.remove('visible')
  document.getElementById('graphArea').classList.add('visible')
  // Collapse the settings form into the thin recap bar so the graph below
  // gets the full vertical real estate of the viewport. Click the recap to expand.
  collapseSettings()
  setView('graph')
}

function collapseSettings() {
  const seed = currentScanWallets[0] || ''
  const seedShort = seed ? seed.slice(0,6)+'…'+seed.slice(-4) : '—'
  const extra = currentScanWallets.length > 1 ? `（共 ${currentScanWallets.length} 个种子）` : ''
  document.getElementById('recapSeed').textContent  = `种子 ${seedShort}${extra}`
  // Read date inputs raw so the recap matches what the user actually picked,
  // not the slider's possibly-narrower display range.
  const f = document.getElementById('fromInput').value || ''
  const t = document.getElementById('toInput').value || ''
  document.getElementById('recapRange').textContent = `${f} → ${t}`
  document.getElementById('recapDepth').textContent = `深度 ${scanDepth}`
  document.getElementById('settingsPanel').style.display = 'none'
  document.getElementById('settingsRecap').classList.add('visible')
}

function expandSettings() {
  document.getElementById('settingsPanel').style.display = ''
  document.getElementById('settingsRecap').classList.remove('visible')
}

// ── Graph Layout: D3 force simulation for tracked nodes + static outer ring
// ── for externals.
//
// The tracked nodes (seed + BFS layers) run a real D3 force simulation per
// render: link force, charge, weak per-layer cluster gravity, collision. This
// gives the springy "knowledge graph" feel (drag a node and the rest reflows).
// Externals (layer 99, often 2000+) stay statically pinned on an outer ring so
// we never feed thousands of nodes into the simulation — performance stays
// good even on big scans.

function tokenColor(sym) { return TOKEN_COLORS[sym] ?? 'rgba(245,245,245,0.40)' }

// Persistent position cache so re-renders (filter changes, scan reloads from
// snapshot) don't reset the layout. New nodes get seeded near their layer's
// cluster center.
const _simPos = new Map()

let _showExtMsg = null   // deferred empty-state timer

// Visual feedback shared between the two filter toggles: when ON, the button
// gets the accent border + tint that matches active token chips, so the user
// can tell at a glance which filters are in effect.
function applyToggleStyle(btn, on) {
  if (!btn) return
  btn.style.color        = on ? 'var(--accent)' : 'var(--subtle)'
  btn.style.borderColor  = on ? 'var(--accent)' : 'var(--border)'
  btn.style.background   = 'transparent'
}

function toggleExternal() {
  showExternal = !showExternal
  const btn = document.getElementById('btnShowExt')
  if (btn) btn.textContent = showExternal ? '外部节点 开' : '外部节点 关'
  applyToggleStyle(btn, showExternal)
  if (scanGraph) renderGraph()
}

function toggleUnpriced() {
  hideUnpriced = !hideUnpriced
  const btn = document.getElementById('btnHideUnpriced')
  if (btn) btn.textContent = hideUnpriced ? 'spam 代币 隐藏' : 'spam 代币 显示'
  applyToggleStyle(btn, hideUnpriced)
  if (scanGraph) renderCurrent()
}

// Address search: highlight + zoom-to the first node whose address contains
// the typed substring (case-insensitive). Empty search clears highlight.
// Doesn't filter the graph — just spotlights so the user can find a wallet
// by partial address without scrolling through node labels.
function onAddrSearch() {
  const q = (document.getElementById('addrSearch')?.value || '').trim().toLowerCase()
  const nodeEls = d3.select('#mainSvg').selectAll('g.node')
  if (!q) {
    nodeEls.style('opacity', 1)
    d3.selectAll('#mainSvg path').classed('dim', false).classed('bright', false)
    return
  }
  const matches = []
  nodeEls.each(function(n) {
    if (n.address.toLowerCase().includes(q)) matches.push({el: this, n})
  })
  // Dim non-matches; spotlight matches. Also pulse the matched circles
  // so they catch the eye even when off-screen (animation visible via legend
  // panning or zoom).
  nodeEls.style('opacity', n => n.address.toLowerCase().includes(q) ? 1 : 0.15)
  d3.selectAll('#mainSvg path').classed('dim', true).classed('bright', false)
  // Show a small count badge so the user knows whether 0/1/many matched.
  const badge = document.getElementById('addrSearchBadge')
  if (badge) badge.textContent = matches.length === 0 ? '无' : matches.length === 1 ? '1 个匹配' : `${matches.length} 个匹配`
}

function closeNodeDetail() {
  document.getElementById('nodeDetail').classList.remove('visible')
}

// Find every transfer between two specific addresses, oldest first. Pulls from
// the full transfers list (not edges) so callers see one row per on-chain event,
// not an aggregate.
function transfersBetween(a, b) {
  if (!scanGraph) return []
  return scanGraph.transfers
    .filter(t => (t.from === a && t.to === b) || (t.from === b && t.to === a))
    .sort((x, y) => x.timestamp - y.timestamp)
}

// Helius tx-source / tx-type → human label + color, used to render the badge
// on each chain row. Anything unrecognized falls through to the raw source
// string so we never lose information.
const TX_SOURCE_LABELS = {
