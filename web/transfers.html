  SOLANA_PROGRAM_LIBRARY: { label: '代币转账', color: 'rgba(245,245,245,0.40)' },
  JUPITER:    { label: 'Jupiter swap',    color: '#C5FF4A' },
  RAYDIUM:    { label: 'Raydium swap',    color: '#5DD49A' },
  ORCA:       { label: 'Orca swap',       color: '#5DD49A' },
  METEORA:    { label: 'Meteora swap',    color: '#5DD49A' },
  PHOENIX:    { label: 'Phoenix swap',    color: '#5DD49A' },
  PUMP_FUN:   { label: 'pump.fun',        color: '#C5FF4A' },
  PUMP_AMM:   { label: 'pump AMM',        color: '#C5FF4A' },
  MAGIC_EDEN: { label: 'NFT (Magic Eden)', color: '#A78BFA' },
  TENSOR:     { label: 'NFT (Tensor)',    color: '#A78BFA' },
  STAKE_PROGRAM: { label: '质押', color: '#6B9BFF' },
}

function txBadgeHtml(t) {
  if (!t.txSource && !t.txType) return ''
  const info = TX_SOURCE_LABELS[t.txSource]
  if (info) return `<span class="chain-badge" style="color:${info.color};border-color:${info.color}40;background:${info.color}12">${info.label}</span>`
  // Fall through: show raw source/type when not in the map, so user still gets the signal.
  const raw = t.txSource && t.txSource !== 'UNKNOWN' ? t.txSource.toLowerCase().replace(/_/g, ' ')
            : t.txType ? t.txType.toLowerCase()
            : ''
  return raw ? `<span class="chain-badge" style="color:var(--muted);border-color:var(--border);background:transparent">${raw}</span>` : ''
}

// One row of the chain panel. Header reads "seed ↔ viewer" left-to-right;
// "→" means seed sent to viewer, "←" means viewer sent to seed. The tx badge
// (Jupiter swap / Raydium swap / etc.) tells the reader *what kind* of transfer
// this is at a glance.
function chainRowHtml(t, leftAddr, rightAddr) {
  const leftToRight = t.from === leftAddr
  const sym   = symbolForMint(t.mint)
  const usd   = edgeUsdEstimate(t.mint, t.symbol, t.amount)
  const time  = new Date(t.timestamp * 1000).toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' })
  const usdStr = usd > 0.01 ? `<span class="chain-usd">约 $${fmtN(usd)}</span>` : ''
  const direction = leftToRight ? '<span class="chain-arrow out" title="种子 → 目标">→</span>' : '<span class="chain-arrow in" title="种子 ← 目标">←</span>'
  return `<div class="chain-row">
    <span class="chain-time">${time}</span>
    ${direction}
    <span class="chain-tok"><span title="${t.mint}">${sym}</span> <span class="chain-amt">${fmtN(t.amount)}</span>${usdStr}${txBadgeHtml(t)}</span>
    <a class="chain-tx-link" href="https://solscan.io/tx/${t.txHash}" target="_blank" rel="noopener" title="在 Solscan 查看交易">↗</a>
  </div>`
}

// Build an in-memory address→neighbor map (with priced USD weights) once per
// section render. Used by findBestPath to discover multi-hop chains between
// seed and viewer. Memoized off scanGraph so re-renders reuse the index.
let _chainAdjacency = null
let _chainAdjacencyFor = null
function getChainAdjacency() {
  if (_chainAdjacency && _chainAdjacencyFor === scanGraph) return _chainAdjacency
  const adj = new Map()    // addr → Map(neighbor → { usd, txs })
  for (const t of scanGraph.transfers) {
    if (!t.from || !t.to || t.from === t.to) continue
    const usd = edgeUsdEstimate(t.mint, t.symbol, t.amount) || 0
    for (const [a, b] of [[t.from, t.to], [t.to, t.from]]) {
      if (!adj.has(a)) adj.set(a, new Map())
      const m = adj.get(a)
      if (!m.has(b)) m.set(b, { usd: 0, txs: [] })
      const e = m.get(b)
      e.usd += usd
      e.txs.push(t)
    }
  }
  _chainAdjacency = adj
  _chainAdjacencyFor = scanGraph
  return adj
}

// Multi-hop path finder: returns the highest-USD-bottleneck path from `from`
// to `to`, length 1-3 hops. We optimize for path bottleneck (min edge USD
// along the path) rather than sum, because that represents how much of the
// flow actually traverses the chain. Search is exhaustive up to maxHops
// because the tracked subgraph is small (~30-50 nodes for typical scans).
// Returns array of addresses including endpoints, or null if no path found.
function findBestPath(from, to, maxHops = 3) {
  const adj = getChainAdjacency()
  if (!adj.has(from) || !adj.has(to)) return null
  // BFS by hop count; within each hop bucket pick the best by bottleneck USD.
  // Avoid going back through seeds or the destination so we don't trace cycles.
  let best = null
  function dfs(node, path, minUsd, depth) {
    if (depth > maxHops) return
    if (node === to) {
      if (path.length >= 2 && (!best || minUsd > best.minUsd)) {
        best = { path: [...path], minUsd }
      }
      return
    }
    const nbrs = adj.get(node)
    if (!nbrs) return
    for (const [nb, edge] of nbrs) {
      if (path.includes(nb)) continue   // simple-path constraint
      if (edge.usd <= 0) continue       // need priced edges only
      const newMin = Math.min(minUsd, edge.usd)
      // Pruning: if newMin can't beat best, skip
      if (best && newMin <= best.minUsd) continue
      path.push(nb)
      dfs(nb, path, newMin, depth + 1)
      path.pop()
    }
  }
  dfs(from, [from], Infinity, 0)
  return best ? best.path : null
}

// Render a multi-hop chain (3+ nodes) as alternating "经过中转钱包 X" headers
// + the time-ordered transfers crossing each leg. Reuses chainRowHtml so the
// styling matches the direct-section case.
function renderHopChain(path) {
  const adj = getChainAdjacency()
  const parts = []
  for (let i = 0; i < path.length - 1; i++) {
    const a = path[i], b = path[i + 1]
    const isMiddle = i > 0
    if (isMiddle) {
      const short = a.slice(0, 6) + '…' + a.slice(-4)
      parts.push(`<div class="chain-hop">经过中转钱包 ${short}</div>`)
    }
    // Most-impactful transfers for this leg: sort by USD desc, take top 5.
    const edge = adj.get(a)?.get(b)
    const txs = (edge?.txs ?? [])
      .slice()
      .sort((x, y) => edgeUsdEstimate(y.mint, y.symbol, y.amount) - edgeUsdEstimate(x.mint, x.symbol, x.amount))
      .slice(0, 5)
    parts.push(txs.map(t => chainRowHtml(t, a, b)).join(''))
  }
  return parts.join('')
}

// Per-seed section: direct transfers between seed and viewer, time-sorted.
// When there are none, fall back to a multi-hop best-path search (up to 3
// hops). Only when even that fails do we show "no connection".
function chainSectionHtml(seed, viewer) {
  if (seed === viewer) return ''
  const direct = transfersBetween(seed, viewer)
  const seedShort = seed.slice(0, 6) + '…' + seed.slice(-4)
  const viewShort = viewer.slice(0, 6) + '…'
  let body = ''
  let tagOverride = null
  if (direct.length) {
    body = direct.map(t => chainRowHtml(t, seed, viewer)).join('')
  } else {
    // No direct edge — try multi-hop path search up to 3 hops first because
    // it handles terminal entities (CEX deposit 2-3 hops out) that the old
    // 1-hop heuristic missed.
    const path = findBestPath(seed, viewer, 3)
    if (path && path.length > 1) {
      body = renderHopChain(path)
      tagOverride = `${path.length - 1} 跳路径`
    } else {
    // Original 1-hop sibling search as a last resort — catches the case
    // where both addresses talked to the same wallet but no priced edge
    // chain exists between them.
    const seedCps   = new Set(scanGraph.transfers.filter(t => t.from === seed).map(t => t.to)
      .concat(scanGraph.transfers.filter(t => t.to === seed).map(t => t.from)))
    const viewerCps = new Set(scanGraph.transfers.filter(t => t.from === viewer).map(t => t.to)
      .concat(scanGraph.transfers.filter(t => t.to === viewer).map(t => t.from)))
    const hops = [...seedCps].filter(a => viewerCps.has(a) && a !== seed && a !== viewer).slice(0, 3)
    if (!hops.length) {
      body = `<div class="chain-empty">扫描窗口内这两个地址之间没有直连，也没找到中转路径。</div>`
    } else {
      body = hops.map(hop => {
        const hopShort = hop.slice(0,6)+'…'+hop.slice(-4)
        const sToHop = transfersBetween(seed, hop).slice(-3)
        const hopToV = transfersBetween(hop, viewer).slice(0, 3)
        return `<div class="chain-hop">经过中转钱包 ${hopShort}</div>
          ${sToHop.map(t => chainRowHtml(t, seed, hop)).join('')}
          ${hopToV.map(t => chainRowHtml(t, hop, viewer)).join('')}`
      }).join('')
      tagOverride = '间接连接'
    }
    }  // end of inner else (multi-hop search miss → 1-hop fallback)
  }
  const tag = direct.length
    ? `${direct.length} 笔直连`
    : (tagOverride || (body.includes('chain-empty') ? '无连线' : '间接连接'))
  return `<div class="chain-section">
    <div class="chain-header">
      <span>种子 ${seedShort} ↔ ${viewShort}</span>
      <span class="chain-count">${tag}</span>
    </div>
    ${body}
  </div>`
}

// Render a single key/value row using the existing flat-row style. Kept tight
// so dense sections like 概览 / 行为分析 stay scannable.
function detailRow(k, v) {
  return `<div class="node-detail-row"><span class="node-detail-label">${k}</span><span class="node-detail-val">${v}</span></div>`
}

function showNodeDetail(n, graphEdges) {
  const inEdges  = graphEdges.filter(e => e.target === n.address)
  const outEdges = graphEdges.filter(e => e.source === n.address)
  const inAmt    = inEdges.reduce((s,e) => s+e.amount, 0)
  const outAmt   = outEdges.reduce((s,e) => s+e.amount, 0)
  const inUsd    = inEdges.reduce((s,e) => s+(e.usdScore||0), 0)
  const outUsd   = outEdges.reduce((s,e) => s+(e.usdScore||0), 0)
  const okx      = okxDataMap.get(n.address)
  const intel    = walletIntel.get(n.address)
  const isSus    = suspectsSet.has(n.address)
  const sus      = suspects.find(s => s.address === n.address)

  const layerWord = n.isSeed ? '种子' : n.layer >= 99 ? '外部（仅 1-2 笔关联）' : `第 ${n.layer} 跳`

  // Entity / suspect banner (collapsed when nothing notable).
  let entityBannerHtml = ''
  if (intel?.staticLabel) {
    const c = entityColor(intel.staticLabel.type)
    entityBannerHtml = `<div style="background:${c}20;border:1px solid ${c}50;padding:6px 10px;margin-bottom:10px;display:flex;align-items:center;gap:8px">
      <span style="color:${c};font-family:var(--font-mono);font-size:11px;font-weight:700">${intel.staticLabel.name}</span>
      <span style="color:var(--muted);font-family:var(--font-mono);font-size:9px;text-transform:uppercase">${intel.staticLabel.type}</span>
      ${intel.staticLabel.note ? `<span style="color:var(--subtle);font-size:10px">${intel.staticLabel.note}</span>` : ''}
    </div>`
  } else if (intel?.behaviorTags.includes('whale')) {
    // Whale banner comes from on-chain lamports balance (>=10k SOL). The
    // summary always starts with "链上余额 X SOL ·" so it's the most
    // actionable single line to surface above all other metadata.
    entityBannerHtml = `<div style="background:transparent;border:1px solid rgba(93,212,154,0.30);padding:6px 10px;margin-bottom:10px"><span style="color:#5DD49A;font-family:var(--font-mono);font-size:11px;font-weight:700">▲ 巨鲸</span> <span style="color:var(--ink);font-size:11px;margin-left:8px">${intel.summary}</span></div>`
  } else if (intel?.behaviorTags.includes('cex-like')) {
    entityBannerHtml = `<div style="background:transparent;border:1px solid rgba(107,155,255,0.30);padding:6px 10px;margin-bottom:10px"><span style="color:#6B9BFF;font-family:var(--font-mono);font-size:10px">⚠ Suspected CEX address — ${intel.summary}</span></div>`
  } else if (intel?.behaviorTags.includes('mixer-like')) {
    entityBannerHtml = `<div style="background:transparent;border:1px solid rgba(255,92,92,0.30);padding:6px 10px;margin-bottom:10px"><span style="color:#FF5C5C;font-family:var(--font-mono);font-size:10px">⚠ Mixer-like pattern — ${intel.summary}</span></div>`
  } else if (intel?.behaviorTags.includes('high-fan-out')) {
    entityBannerHtml = `<div style="background:transparent;border:1px solid rgba(197,255,74,0.30);padding:6px 10px;margin-bottom:10px"><span style="color:#C5FF4A;font-family:var(--font-mono);font-size:10px">↗ High scatter — ${intel.summary}</span></div>`
  }

  // ── 与种子的资金关系 — top section, the analyst-first headline ────────────
  // Replaces the old "概览" that mixed seed-relationship with global footprint.
  // For non-seeds we lead with direct in/out USD specifically against the seed
  // (using priced edges), plus first/last interaction; the global stats get
  // demoted into a collapsed "整体活动" sub-row.
  const rel = scanGraph?.seedRelation?.[n.address]
  const fmtRelUsd = u => u >= 1 ? '$' + fmtN(u) : u > 0 ? '$' + u.toFixed(2) : '$0'
  const fmtRelDate = ts => ts ? new Date(ts*1000).toLocaleDateString('zh-CN', {year:'2-digit', month:'numeric', day:'numeric'}) : '—'
  const relRows = []
  if (n.isSeed) {
    relRows.push(detailRow('位置', '种子'))
  } else if (rel) {
    const netUsd = rel.directInUsd - rel.directOutUsd
    const hopLabel = !isFinite(rel.hopDistance) ? '无可达路径'
                   : rel.hopDistance === 1 ? '直连种子'
                   : `距种子 ${rel.hopDistance} 跳`
    relRows.push(detailRow('位置', `${layerWord} · ${hopLabel}`))
    if (rel.directTxCount > 0) {
      // Direction marker tells the analyst at a glance whether this address
      // RECEIVED net from seed (cash-out destination?) or SENT net to seed
      // (funder?). The net USD is the unambiguous "value transferred between
      // this pair", which is the question they actually asked by clicking.
      const dirArrow = netUsd >= 0 ? '↘ 种子流入' : '↗ 流向种子'
      relRows.push(detailRow('直连净流', `${dirArrow} ${fmtRelUsd(Math.abs(netUsd))}`))
      relRows.push(detailRow('直连明细', `${rel.directTxCount} 笔 · 入 ${fmtRelUsd(rel.directInUsd)} · 出 ${fmtRelUsd(rel.directOutUsd)}`))
      relRows.push(detailRow('互动时间', `${fmtRelDate(rel.firstTs)} → ${fmtRelDate(rel.lastTs)}`))
    } else {
      relRows.push(detailRow('与种子', '无直连'))
      if (rel.indirectInUsd + rel.indirectOutUsd > 0) {
        relRows.push(detailRow('1 跳间接', `约 ${fmtRelUsd(rel.indirectInUsd + rel.indirectOutUsd)}`))
      }
    }
  } else {
    relRows.push(detailRow('位置', layerWord))
  }
  if (hotWallets.has(n.address)) relRows.push(detailRow('BFS 状态', '已跳过（疑似池子 / 高频）'))
  if (okx) {
    relRows.push(detailRow('链上持仓', `$${fmtN(okx.portfolioUsd)}`))
    if (okx.targetTokenUsd) relRows.push(detailRow('目标代币', `$${fmtN(okx.targetTokenUsd)}（占 SPL ${okx.targetTokenPct?.toFixed(0)}%）`))
  }

  // Global footprint is secondary — collapsed by default so the seed-
  // relationship numbers above don't have to fight for attention.
  const globalRows = [
    detailRow('总边数', `${inEdges.length} 入 / ${outEdges.length} 出`),
    detailRow('总转入', `${fmtN(inAmt)}${inUsd > 0 ? `（约 $${fmtN(inUsd)}）` : ''}`),
    detailRow('总转出', `${fmtN(outAmt)}${outUsd > 0 ? `（约 $${fmtN(outUsd)}）` : ''}`),
  ]

  // ── 行为分析 — risk + tags up top, detailed CV stats collapsed by default ──
  let behaviorHtml = ''
  if (intel && (intel.riskScore > 0 || intel.behaviorTags.length || intel.stats)) {
    const primary = []
    if (intel.riskScore > 0)             primary.push(detailRow('风险评分', `${intel.riskScore}/100`))
    if (intel.behaviorTags.length)       primary.push(detailRow('行为标签', intel.behaviorTags.join('、')))
    if (intel.stats?.txPerHour != null)  primary.push(detailRow('每小时交易', `${intel.stats.txPerHour.toFixed(1)} 笔`))
    if (intel.stats?.outDegree != null)  primary.push(detailRow('出度', `${intel.stats.outDegree} 个唯一收款方`))

    const advanced = []
    const st = intel.stats || {}
    if (st.interTxCV  != null) advanced.push(detailRow('交易间隔 CV', `${st.interTxCV.toFixed(2)} ${st.interTxCV < 0.3 ? '⚠ 机器人节奏' : ''}`))
    if (st.burstRatio != null) advanced.push(detailRow('爆发比例', `${(st.burstRatio*100).toFixed(0)}% 在 60 秒窗口内`))
    if (st.amountCV   != null) advanced.push(detailRow('金额 CV', `${st.amountCV.toFixed(2)} ${st.amountCV < 0.2 ? '⚠ 金额固定' : ''}`))

    behaviorHtml = `<div class="detail-section">
      <div class="detail-section-head">行为分析</div>
      ${primary.join('')}
      ${advanced.length ? `<details class="detail-more"><summary>更多统计</summary>${advanced.join('')}</details>` : ''}
    </div>`
  }

  // ── 与种子的连接 — only for non-seed nodes ────────────────────────────────
  let chainHtml = ''
  if (!n.isSeed && currentScanWallets.length) {
    const sections = currentScanWallets.map(seed => chainSectionHtml(seed, n.address)).join('')
    if (sections.trim()) {
      chainHtml = `<div class="detail-section">
        <div class="detail-section-head">与种子的连接</div>
        ${sections}
      </div>`
    }
  }

  document.getElementById('nodeDetailContent').innerHTML = `
    ${isSus ? `<div style="color:var(--red);font-family:var(--font-mono);font-size:10px;margin-bottom:8px">⚠ SUSPECT: ${sus?.reason ?? ''}</div>` : ''}
    ${entityBannerHtml}
    <div class="detail-section-head" style="margin-top:0">地址</div>
    <div class="node-detail-addr">${n.address}
      <button class="node-detail-copy" onclick="navigator.clipboard.writeText('${n.address}').catch(()=>{})">copy</button>
    </div>
    <div class="detail-section">
      <div class="detail-section-head">与种子的资金关系</div>
      ${relRows.join('')}
    </div>
    ${chainHtml}
    ${behaviorHtml}
    <div class="detail-section">
      <details class="detail-more"><summary>整体活动量（不限于种子相关）</summary>
        ${globalRows.join('')}
      </details>
    </div>
    <div style="margin-top:14px;display:flex;gap:6px;flex-wrap:wrap">
      <a href="https://solscan.io/account/${n.address}" target="_blank" style="font-family:var(--font-mono);font-size:10px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:3px 8px">Solscan ↗</a>
      <a href="https://birdeye.so/profile/${n.address}?chain=solana" target="_blank" style="font-family:var(--font-mono);font-size:10px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:3px 8px">Birdeye ↗</a>
      <a href="https://platform.arkhamintelligence.com/explorer/address/${n.address}" target="_blank" style="font-family:var(--font-mono);font-size:10px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:3px 8px">Arkham ↗</a>
      <a href="https://web3.okx.com/portfolio/${n.address}/analysis?chainIndex=501" target="_blank" style="font-family:var(--font-mono);font-size:10px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:3px 8px">OKX ↗</a>
    </div>`

  document.getElementById('nodeDetail').classList.add('visible')
}

// Click an edge → list every raw transfer underlying it, time-ordered, with
// tx-source badges. Edges in the graph are already aggregated per
// (from, to, mint), so we re-derive the raw rows from scanGraph.transfers and
// honor whichever direction each tx actually flowed.
function showEdgeDetail(simEdge) {
  const fromAddr = simEdge.source.address ?? simEdge.source
  const toAddr   = simEdge.target.address ?? simEdge.target
  const mint     = simEdge.mint

  // Pull raw transfers for this token between this pair, both directions, sorted by time.
  const rows = (scanGraph?.transfers ?? [])
    .filter(t => t.mint === mint &&
      ((t.from === fromAddr && t.to === toAddr) || (t.from === toAddr && t.to === fromAddr)))
    .sort((a, b) => a.timestamp - b.timestamp)

  // Aggregate per-direction so the header summarizes net flow without forcing
  // the user to eyeball each row.
  let fwdCount = 0, bwdCount = 0, fwdAmt = 0, bwdAmt = 0
  for (const t of rows) {
    if (t.from === fromAddr) { fwdCount++; fwdAmt += t.amount }
    else                      { bwdCount++; bwdAmt += t.amount }
  }
  const netAmt = fwdAmt - bwdAmt
  const sym    = symbolForMint(mint)
  const netUsd = edgeUsdEstimate(mint, simEdge.symbol, Math.abs(netAmt))
  const grossUsd = edgeUsdEstimate(mint, simEdge.symbol, fwdAmt + bwdAmt)

  const shortFrom = fromAddr.slice(0, 6) + '…' + fromAddr.slice(-4)
  const shortTo   = toAddr.slice(0, 6)   + '…' + toAddr.slice(-4)

  // Each row reuses the chain-panel styling; we pick leftAddr=fromAddr so the
  // arrow direction matches the panel header (→ means fromAddr sent).
  const rowHtml = rows.map(t => chainRowHtml(t, fromAddr, toAddr)).join('')

  // ── Source-tag breakdown — tells the analyst at a glance whether this
  // relationship is plain p2p transfers, DEX swap fallout, multi-sig pay-out,
  // pump.fun activity, etc. We bucket by txSource (Helius's parsed protocol)
  // then label the dominant pattern.
  const sourceCount = new Map()
  for (const t of rows) {
    const key = t.txSource || t.txType || 'UNKNOWN'
    sourceCount.set(key, (sourceCount.get(key) ?? 0) + 1)
  }
  const sourceParts = [...sourceCount.entries()]
    .sort((a, b) => b[1] - a[1])
    .map(([src, cnt]) => {
      const info = TX_SOURCE_LABELS[src]
      const label = info?.label || (src === 'UNKNOWN' ? '未知' : src.toLowerCase().replace(/_/g, ' '))
      const color = info?.color || 'var(--muted)'
      return `<span style="color:${color};margin-right:8px">${label} <span style="color:var(--subtle)">${cnt}</span></span>`
    }).join('')

  // High-level relationship verdict — heuristic but matches what an analyst
  // would say after eyeballing the rows.
  const swapSources = ['JUPITER','RAYDIUM','ORCA','METEORA','PHOENIX','PUMP_FUN','PUMP_AMM']
  const swapCount = [...sourceCount.entries()].filter(([s]) => swapSources.includes(s)).reduce((s,[,c]) => s+c, 0)
  const transferCount = (sourceCount.get('SYSTEM_PROGRAM') ?? 0) + (sourceCount.get('TRANSFER') ?? 0)
  const stakeCount = sourceCount.get('STAKE_PROGRAM') ?? 0
  let verdict = ''
  if (swapCount > rows.length * 0.6)        verdict = 'DEX 撮合产物（非真转账）'
  else if (transferCount > rows.length * 0.8) verdict = '纯转账关系'
  else if (stakeCount > 0)                  verdict = '含质押动作'
  else if (rows.length === 1)               verdict = '单笔接触'
  else if (fwdCount > 0 && bwdCount > 0)    verdict = '双向往来'
  else                                      verdict = '单向资金流'

  document.getElementById('nodeDetailContent').innerHTML = `
    <div class="detail-section-head" style="margin-top:0">资金流</div>
    <div class="edge-head">
      <div class="edge-pair"><span class="edge-addr">${shortFrom}</span><span class="edge-arrow">→</span><span class="edge-addr">${shortTo}</span></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">代币 <span style="color:var(--text)">${sym}</span> · <span style="color:var(--accent)">${verdict}</span></div>
    </div>
    <div class="edge-summary">
      <span class="es-k">笔数</span><span class="es-v">${rows.length}（${fwdCount} 出 / ${bwdCount} 入）</span>
      <span class="es-k">${shortFrom} → ${shortTo}</span><span class="es-v">${fmtN(fwdAmt)} ${sym}</span>
      <span class="es-k">${shortTo} → ${shortFrom}</span><span class="es-v">${fmtN(bwdAmt)} ${sym}</span>
      <span class="es-k">净流</span><span class="es-v">${netAmt >= 0 ? '→' : '←'} ${fmtN(Math.abs(netAmt))} ${sym}${netUsd > 0.01 ? ` · 约 $${fmtN(netUsd)}` : ''}</span>
      ${grossUsd > 0.01 ? `<span class="es-k">毛流量</span><span class="es-v">约 $${fmtN(grossUsd)}</span>` : ''}
      <span class="es-k">首末</span><span class="es-v" style="font-size:10px">${new Date(rows[0]?.timestamp*1000).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'})} → ${new Date(rows[rows.length-1]?.timestamp*1000).toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'})}</span>
    </div>
    ${sourceParts ? `<div style="padding:6px 0;font-family:var(--font-mono);font-size:10px;border-bottom:1px solid var(--border)">
      <span style="color:var(--muted);margin-right:8px">途径</span>${sourceParts}
    </div>` : ''}
    <div class="detail-section" style="margin-top:10px">
      <div class="detail-section-head">逐笔（时序）<span class="detail-section-extra">${rows.length} 笔</span></div>
      ${rowHtml || '<div class="chain-empty">未找到原始转账。</div>'}
    </div>
    <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
      <a href="https://solscan.io/account/${fromAddr}" target="_blank" style="font-family:var(--font-mono);font-size:10px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:3px 8px">${shortFrom} ↗</a>
      <a href="https://solscan.io/account/${toAddr}" target="_blank" style="font-family:var(--font-mono);font-size:10px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:3px 8px">${shortTo} ↗</a>
    </div>`

  document.getElementById('nodeDetail').classList.add('visible')
}

function renderGraph() {
  if (!scanGraph) return

  const nodeMap    = new Map(scanGraph.nodes.map(n => [n.address, n]))
  const tracked    = new Set(scanGraph.nodes.map(n => n.address))
  const allEdges   = getFilteredEdges()
  const graphEdges = allEdges.filter(e => tracked.has(e.source) && tracked.has(e.target))

  // Active node set — externals only join if showExternal=true.
  const active = new Set()
  for (const e of graphEdges) {
    const s = nodeMap.get(e.source), t = nodeMap.get(e.target)
    if (!s || !t) continue
    if (s.layer < 99) active.add(e.source)
    if (t.layer < 99) active.add(e.target)
    if (showExternal) { active.add(e.source); active.add(e.target) }
  }
  for (const n of scanGraph.nodes) { if (n.isSeed) active.add(n.address) }
  const allNodes = [...active].map(id => nodeMap.get(id)).filter(Boolean)

  // Empty state
  if (graphEdges.length === 0) {
    const svg = d3.select('#mainSvg')
    svg.selectAll('*').remove()
    svg.append('text').attr('x', '50%').attr('y', '50%').attr('text-anchor', 'middle')
      .attr('fill', 'rgba(245,245,245,0.40)').attr('font-family', '"JetBrains Mono",monospace').attr('font-size', 13)
      .text('当前筛选下没有可显示的转账')
    return
  }

  const wrap = document.getElementById('svgWrap')
  const W = wrap.clientWidth || 1280, H = wrap.clientHeight || 500
  const cx = W / 2, cy = H / 2

  // Split: tracked goes into the force simulation, externals get pinned on an
  // outer ring statically. With ~2000 externals this saves the sim from melting.
  const trackedNodes  = allNodes.filter(n => n.layer < 99)
  const externalNodes = allNodes.filter(n => n.layer >= 99)

  // Per-layer cluster centers, spread on a ring around the seed cluster.
  const trackedLayers = [...new Set(trackedNodes.map(n => n.layer))].sort((a,b) => a-b)
  const maxLayer = trackedLayers.length ? Math.max(...trackedLayers, 1) : 1
  const ringR    = Math.min(W, H) * 0.22
  const clusterCenter = new Map()
  clusterCenter.set(0, [cx, cy])
  let nonSeedLayers = trackedLayers.filter(l => l !== 0)
  nonSeedLayers.forEach((layer, i) => {
    const angle = (2 * Math.PI * i) / Math.max(1, nonSeedLayers.length) - Math.PI / 2
    const r = ringR * (1 + (layer - 1) * 0.6)
    clusterCenter.set(layer, [cx + r * Math.cos(angle), cy + r * Math.sin(angle)])
  })

  // Seed node positions from the cache, or near the layer's cluster center for new nodes.
  for (const n of trackedNodes) {
    const prev = _simPos.get(n.address)
    if (prev) { n.x = prev.x; n.y = prev.y; n.vx = 0; n.vy = 0 }
    else {
      const [ccx, ccy] = clusterCenter.get(n.layer) || [cx, cy]
      n.x = ccx + (Math.random() - 0.5) * 80
      n.y = ccy + (Math.random() - 0.5) * 80
      n.vx = 0; n.vy = 0
    }
  }
  // Seed isSeed nodes near the exact center (small jitter when multiple seeds).
  const seedNodes = trackedNodes.filter(n => n.isSeed)
  seedNodes.forEach((s, i) => {
    if (seedNodes.length === 1) { s.x = cx; s.y = cy }
    else {
      const a = (2 * Math.PI * i) / seedNodes.length
      s.x = cx + 30 * Math.cos(a); s.y = cy + 30 * Math.sin(a)
    }
    s.fx = s.x; s.fy = s.y   // pin seeds so the rest of the graph orbits them
  })

  // Externals get a temporary initial position; the real placement runs after
  // the force-sim pre-tick once tracked nodes have settled. Without a starting
  // point d3.forceSimulation would log NaN warnings if simEdges tries to read
  // x/y before the post-tick replacement.
  externalNodes.forEach(n => { n.x = cx; n.y = cy })

  // Build mutable edge objects for d3.forceLink (it mutates source/target into node refs).
  const nodeByAddr = new Map(allNodes.map(n => [n.address, n]))
  const simEdges = graphEdges.map(e => ({
    ...e,
    source: nodeByAddr.get(e.source),
    target: nodeByAddr.get(e.target),
  })).filter(e => e.source && e.target)

  // Force tuning by graph size — smaller scans get stronger spring; large get
  // weaker so the layout settles within the pre-tick budget.
  const N = trackedNodes.length
  // Spread nodes farther so 30-edge hubs don't collapse into a tight bundle
  // where every arrow lands within 20px of the same point. Bigger collision
  // radius + longer links + stronger repulsion all push the same direction:
  // give labels room to breathe and let edge angles read distinctly.
  const chargeStr = N > 80 ? -480 : N > 30 ? -680 : -880
  const linkDist  = N > 80 ? 110 : N > 30 ? 150 : 180

  function forceCluster(alpha) {
    for (const n of trackedNodes) {
      if (n.fx != null) continue
      const [ccx, ccy] = clusterCenter.get(n.layer) || [cx, cy]
      n.vx += (ccx - n.x) * alpha * 0.18
      n.vy += (ccy - n.y) * alpha * 0.18
    }
  }

  const sim = d3.forceSimulation(allNodes)
    .force('link',    d3.forceLink(simEdges).id(d => d.address).distance(linkDist).strength(0.45))
    .force('charge',  d3.forceManyBody().strength(chargeStr).distanceMax(700))
    .force('center',  d3.forceCenter(cx, cy).strength(0.02))
    // Collide radius bumped: tracked nodes 28 (was 14) so labels don't slam
    // into each other. The seed gets 36 because its label is bigger and
    // its centrality means it's always crowded.
    .force('collide', d3.forceCollide(n => n.isSeed ? 36 : (n.layer >= 99 ? 5 : 28)))
    .force('cluster', forceCluster)
    .alphaDecay(0.028)
    .stop()

  // Pre-tick to a near-stable state before we paint anything — avoids the
  // "exploding-from-center" startup that real force sims have. After pre-tick
  // we restart at a low alpha so drag interaction still kicks the spring.
  const numTicks = Math.min(280, Math.ceil(Math.log(sim.alphaMin()) / Math.log(1 - 0.028)))
  for (let i = 0; i < numTicks; i++) sim.tick()

  // Now that tracked nodes have settled, scatter externals around their
  // strongest tracked anchor instead of on a uniform outer ring. Each external
  // points to its primary tracked counterparty; clustering them visually
  // around that anchor turns the old artificial-looking "halo ring" into
  // satellite clouds that communicate "this layer-1 wallet has 30 small
  // counterparties hanging off it". Distance offset scales with the
  // surrounding anchor's degree so dense anchors fan further out.
  if (externalNodes.length) {
    // Per-anchor degree (how many externals attach here) — used to space the
    // cloud so heavy anchors don't pack into a tight bullseye.
    const anchorOf = new Map()         // external addr → tracked node ref
    const anchorDeg = new Map()        // tracked addr → external count
    const trackedSet = new Set(trackedNodes.map(n => n.address))
    // For each external, find the strongest USD anchor among tracked nodes.
    for (const ext of externalNodes) {
      let bestAddr = null, bestUsd = -1
      for (const e of graphEdges) {
        if (!e.usdScore || e.usdScore <= bestUsd) continue
        if (e.from === ext.address && trackedSet.has(e.to))   { bestAddr = e.to;   bestUsd = e.usdScore }
        if (e.to   === ext.address && trackedSet.has(e.from)) { bestAddr = e.from; bestUsd = e.usdScore }
      }
      if (bestAddr) {
        anchorOf.set(ext.address, bestAddr)
        anchorDeg.set(bestAddr, (anchorDeg.get(bestAddr) ?? 0) + 1)
      }
    }
    // Per-anchor running index → distinct angle for each satellite.
    const ix = new Map()
    const nodeByAddrLocal = new Map(trackedNodes.map(n => [n.address, n]))
    const outerR = Math.min(W, H) * 0.46
    for (const ext of externalNodes) {
      const anchorAddr = anchorOf.get(ext.address)
      const anchor     = anchorAddr ? nodeByAddrLocal.get(anchorAddr) : null
      if (!anchor) {
        // Orphan external (no priced edge to a tracked node) — drop on the
        // far perimeter so it doesn't visually compete.
        const a = Math.random() * Math.PI * 2
        ext.x = cx + outerR * Math.cos(a); ext.y = cy + outerR * Math.sin(a)
        ext.fx = ext.x; ext.fy = ext.y
        continue
      }
      const deg = anchorDeg.get(anchorAddr) || 1
      const i   = ix.get(anchorAddr) ?? 0
      ix.set(anchorAddr, i + 1)
      if (anchor.isSeed) {
        // Seed typically anchors 50+ externals — packing them into a small
        // halo around the seed swallows the entire central cluster. Instead
        // scatter them onto a wide outer band so they decorate the perimeter
        // without crowding the tracked subgraph.
        const ang  = (i / deg) * 2 * Math.PI + (Math.random() - 0.5) * 0.3
        const band = outerR * (0.78 + Math.random() * 0.22)
        ext.x = cx + band * Math.cos(ang)
        ext.y = cy + band * Math.sin(ang)
      } else {
        // Non-seed anchor: cluster tightly so the satellite cloud reads as
        // "these externals belong to this layer-N wallet". Radius grows
        // with sqrt(deg) to avoid bullseye packing on heavy anchors.
        const subR = 28 + 6 * Math.sqrt(deg)
        const ang  = (i / deg) * 2 * Math.PI + (Math.random() - 0.5) * 0.3
        const dx = anchor.x - cx, dy = anchor.y - cy
        const len = Math.hypot(dx, dy) || 1
        const bx = (dx / len) * (subR * 0.7)   // push slightly outward
        const by = (dy / len) * (subR * 0.7)
        ext.x = anchor.x + bx + subR * Math.cos(ang)
        ext.y = anchor.y + by + subR * Math.sin(ang)
      }
      ext.fx = ext.x; ext.fy = ext.y
    }
  }

  // ── SVG setup ──────────────────────────────────────────────────────────────
  const svg = d3.select('#mainSvg').attr('width', W).attr('height', H)
  svg.selectAll('*').remove()

  const defs = svg.append('defs')

  // Grid background pattern — gives the canvas the "infinite space" feel that
  // knowledge-graph-style viewers have. Lines are barely visible (0.4 opacity
  // dark surface) so they don't compete with nodes/edges.
  defs.append('pattern').attr('id', 'tx-grid').attr('width', 40).attr('height', 40)
    .attr('patternUnits', 'userSpaceOnUse')
    .append('path').attr('d', 'M40 0L0 0 0 40').attr('fill', 'none')
    .attr('stroke', '#1A1A1A').attr('stroke-width', 0.5)

  const zg   = svg.append('g')
  // Grid lives inside the zoom group so it pans/scales with the camera.
  zg.append('rect').attr('x', -W * 5).attr('y', -H * 5)
    .attr('width', W * 10).attr('height', H * 10).attr('fill', 'url(#tx-grid)')

  const zoom = d3.zoom().scaleExtent([0.05, 12])
    .on('zoom', ev => zg.attr('transform', ev.transform))
  svg.call(zoom)

  const linkG = zg.append('g')
  const nodeG = zg.append('g')

  // Arrowhead markers per token color
  const usedCols = [...new Set(graphEdges.map(e => tokenColor(e.symbol)))]
  usedCols.forEach(c => {
    // Smaller, thinner arrowhead — earlier 5x5 markers bloomed against the
    // now-thinner 0.7-2.2px shafts. New shape is a slim 3x3 chevron that
    // reads as a tip, not a flag.
    defs.append('marker').attr('id', 'arr-' + c.replace('#', ''))
      .attr('viewBox', '0 -4 8 8').attr('refX', 10).attr('refY', 0)
      .attr('markerWidth', 3.5).attr('markerHeight', 3.5).attr('orient', 'auto')
      .append('path').attr('d', 'M0,-3L8,0L0,3').attr('fill', c).attr('fill-opacity', 0.55)
  })

  // ── Edges ──────────────────────────────────────────────────────────────────
  // Multi-edge layout: when N tokens connect the same pair (e.g. seed↔CEX has
  // SOL+USDC+USDT edges), the original arc had them stack identically. We now
  // assign each edge an in-pair index so renderEdgePath can offset them along
  // the perpendicular. The pair key sorts the two addresses so seed→CEX and
  // CEX→seed share the same bucket.
  const pairBuckets = new Map()
  for (const e of simEdges) {
    const a = e.source.address, b = e.target.address
    const key = a < b ? `${a}|${b}` : `${b}|${a}`
    if (!pairBuckets.has(key)) pairBuckets.set(key, [])
    pairBuckets.get(key).push(e)
  }
  for (const list of pairBuckets.values()) {
    // Sort by USD desc so the strongest flow takes the central slot — the
    // user's eye finds the big money on the geodesic, side tokens at the edge.
    list.sort((x, y) => (y.usdScore ?? 0) - (x.usdScore ?? 0))
    list.forEach((e, i) => { e._pairIdx = i; e._pairCount = list.length })
  }

  // Edge width and opacity scale with USD — but kept thin overall. Earlier
  // version went up to 5.5px which felt chunky and the arrowheads bloomed.
  // Range now: 0.7-2.2px. Opacity stays in a tight 0.35-0.55 band so the
  // graph reads as a uniform mesh with the big flows just slightly louder.
  const widthForEdge = e => {
    const u = e.usdScore || 0
    if (u <= 0)       return 0.7
    // log10($1) = 0; log10($1M) = 6. Scale * 0.32 caps at ~2.1px.
    return Math.max(0.7, Math.min(2.2, Math.log10(u + 1) * 0.32 + 0.7))
  }
  const opacityForEdge = e => {
    const u = e.usdScore || 0
    if (u <= 0)       return 0.22
    if (u >= 10_000)  return 0.55
    if (u >= 100)     return 0.42
    return 0.32
  }
  const linkPaths = linkG.selectAll('path').data(simEdges).enter().append('path')
    .attr('fill', 'none')
    .attr('stroke', e => tokenColor(e.symbol))
    .attr('stroke-opacity', opacityForEdge)
    .attr('stroke-width', widthForEdge)
    .attr('marker-end', e => widthForEdge(e) >= 1.2 ? `url(#arr-${tokenColor(e.symbol).replace('#', '')})` : null)
    .style('cursor', 'pointer')
    // Edge click → list every transfer between this pair for this token,
    // time-ordered, with tx-source badges. stopPropagation so the svg
    // background-click handler doesn't immediately wipe the highlight.
    .on('click', (ev, e) => {
      ev.stopPropagation()
      showEdgeDetail(e)
      // Visual focus: dim everything except this edge + its two endpoints.
      const aId = e.source.address, bId = e.target.address
      linkPaths
        .classed('bright', x => x === e)
        .classed('dim',    x => x !== e)
      nodeEls.style('opacity', d => (d.address === aId || d.address === bId) ? 1 : 0.22)
    })
    .on('mouseover', (ev, e) => {
      const tip = document.getElementById('tooltip')
      const rect = document.getElementById('svgWrap').getBoundingClientRect()
      tip.style.display = 'block'
      tip.style.left = (ev.clientX - rect.left + 12) + 'px'
      tip.style.top  = (ev.clientY - rect.top - 8)  + 'px'
      const sym = symbolForMint(e.mint)
      tip.textContent = `${sym} · ${e.txCount} 笔 · 点击查看明细`
    })
    .on('mouseleave', () => { document.getElementById('tooltip').style.display = 'none' })

  // Quadratic Bezier with perpendicular offset. Each parallel edge in the same
  // pair gets shifted along the perpendicular so they don't stack. Default
  // curvature (k) is small so the lines read as "almost straight with a
  // suggestion of arc" rather than the heavy 1.6-radius arcs we had before.
  // The curve direction (sign of offset) is consistent per pair so token
  // edges in the same bucket fan symmetrically around the chord.
  function edgePath(e) {
    const s = e.source, t = e.target
    if (!s || !t || s.x == null || t.x == null) return ''
    const dx = t.x - s.x, dy = t.y - s.y
    const dist = Math.hypot(dx, dy) || 1
    // Unit perpendicular (90° CCW).
    const px = -dy / dist, py = dx / dist
    const idx   = e._pairIdx   ?? 0
    const count = e._pairCount ?? 1
    // Spread: 16-26px per slot scaled by chord length so closer pairs space
    // tighter. Centered around 0 so a single edge stays on the geodesic.
    const slot   = (idx - (count - 1) / 2)
    const spread = Math.min(28, Math.max(14, dist * 0.06))
    // Single edges run dead straight (offset=0). Multi-edge pairs spread
    // symmetrically. This keeps the bulk of the graph clean and only the
    // multi-token-per-pair regions show curvature — which is exactly the
    // signal the analyst wants visible ("these two are joined by several
    // tokens, not just one").
    const offset = count > 1 ? slot * spread : 0
    // Control point at midpoint shifted along the perpendicular.
    const mx = (s.x + t.x) / 2 + px * offset
    const my = (s.y + t.y) / 2 + py * offset
    return `M${s.x},${s.y}Q${mx},${my} ${t.x},${t.y}`
  }
  linkPaths.attr('d', edgePath)

  // ── Nodes ──────────────────────────────────────────────────────────────────
  const nodeEls = nodeG.selectAll('g').data(allNodes).enter().append('g')
    .attr('class', n => 'node' + (n.isSeed ? ' seed' : ''))
    .attr('transform', n => `translate(${n.x},${n.y})`)
    .attr('cursor', 'pointer')
    .on('click', (ev, n) => {
      ev.stopPropagation()
      showNodeDetail(n, graphEdges)
      nodeEls.classed('selected', d => d.address === n.address)
      const touching = new Set([n.address])
      simEdges.forEach(e => {
        if (e.source.address === n.address || e.target.address === n.address) {
          touching.add(e.source.address); touching.add(e.target.address)
        }
      })
      linkPaths
        .classed('dim',    e => !(e.source.address === n.address || e.target.address === n.address))
        .classed('bright', e =>   e.source.address === n.address || e.target.address === n.address)
      nodeEls.style('opacity', d => touching.has(d.address) ? 1 : 0.22)
      // Smooth pan to bring the clicked node into the visible sweet spot
      // (left of the right-side detail panel).
      const PANEL_W = 380
      const targetCx = Math.max(W * 0.32, (W - PANEL_W) / 2)
      const cur = d3.zoomTransform(svg.node())
      const k = Math.max(cur.k, 0.85)
      svg.transition().duration(450)
        .call(zoom.transform, d3.zoomIdentity.translate(targetCx - k * n.x, H / 2 - k * n.y).scale(k))
    })
    .on('mouseover', (ev, n) => {
      const tip = document.getElementById('tooltip')
      const rect = document.getElementById('svgWrap').getBoundingClientRect()
      tip.style.display = 'block'
      tip.style.left = (ev.clientX - rect.left + 12) + 'px'
      tip.style.top  = (ev.clientY - rect.top - 8) + 'px'
      tip.textContent = n.label + (n.isSeed ? '（种子）' : '') + (suspectsSet.has(n.address) ? ' ⚠' : '')
    })
    .on('mouseleave', (ev) => {
      document.getElementById('tooltip').style.display = 'none'
      // Whatever shape the node is (circle/rect/path), shrink it back by reverting the scale.
      // We animate scale on the inner shape, not the parent g, so the group's translate stays clean.
      d3.select(ev.currentTarget).selectAll('circle, rect, path').transition().duration(160)
        .attr('transform', 'scale(1)')
    })
    .on('mouseenter', (ev) => {
      // Subtle scale-up tells the user "this is clickable" + makes tiny external dots reachable.
      d3.select(ev.currentTarget).selectAll('circle, rect, path').transition().duration(160)
        .attr('transform', 'scale(1.3)')
    })
    .call(d3.drag()
      .on('start', (ev, n) => {
        if (n.layer >= 99) return   // externals are pinned, no drag
        if (!ev.active) sim.alphaTarget(0.18).restart()
        n.fx = n.x; n.fy = n.y
      })
      .on('drag', (ev, n) => {
        if (n.layer >= 99) return
        n.fx = ev.x; n.fy = ev.y
      })
      .on('end', (ev, n) => {
        if (n.layer >= 99) return
        if (!ev.active) sim.alphaTarget(0)
        // Seeds stay pinned. Other nodes release so the graph can re-settle.
        if (!n.isSeed) { n.fx = null; n.fy = null }
      }))

  // Shape encoding: pools / hot fan-out wallets get a diamond, CEX addresses
  // get a square, mixers get a downward triangle, everyone else gets a circle.
  // Shape carries semantic meaning faster than color alone.
  function nodeKind(n) {
    if (n.isSeed) return 'seed'
    if (hotWallets.has(n.address)) return 'pool'   // auto-detected pool / high fan-out
    const intel = walletIntel.get(n.address)
    if (intel?.staticLabel?.type === 'cex')    return 'cex'
    if (intel?.staticLabel?.type === 'bridge') return 'bridge'
    if (intel?.staticLabel?.type === 'mixer')  return 'mixer'
    if (intel?.behaviorTags?.includes('cex-like'))   return 'cex'
    if (intel?.behaviorTags?.includes('mixer-like')) return 'mixer'
    return 'wallet'
  }
  function nodeFill(n) {
    if (suspectsSet.has(n.address)) return '#FF5C5C'
    const kind = nodeKind(n)
    if (kind === 'pool')   return '#A78BFA'
    if (kind === 'cex')    return '#6B9BFF'
    if (kind === 'bridge') return '#6B9BFF'
    if (kind === 'mixer')  return '#FF5C5C'
    return LAYER_COLORS[Math.min(n.layer >= 99 ? 4 : n.layer, LAYER_COLORS.length-1)]
  }
  function nodeStroke(n) {
    if (n.isSeed) return 'rgba(255,255,255,0.6)'
    if (walletIntel.has(n.address)) return 'rgba(255,255,255,0.35)'
    if (okxDataMap.has(n.address)) return 'rgba(93,212,154,0.7)'
    return 'none'
  }

  // Draw each node with the shape its `nodeKind` dictates. Path strings use
  // local coordinates around (0,0); the group's translate(x,y) places it.
  // Sizes chosen to be roughly equal-area, so a diamond and a circle look
  // comparably weighted.
  nodeEls.each(function(n) {
    const sel  = d3.select(this)
    const r    = n.isSeed ? 14 : n.layer >= 99 ? 4 : 9
    const fill = nodeFill(n), stroke = nodeStroke(n)
    const kind = nodeKind(n)
    const intel = walletIntel.get(n.address)
    const isClosed = intel?.behaviorTags?.includes('closed')
    // Closed accounts get a thicker dashed red ring so they read as "phantom"
    // — the account in the transfer history no longer exists on chain.
    const strokeW = isClosed ? 2 : (n.isSeed || walletIntel.has(n.address) || okxDataMap.has(n.address) ? 2 : 0)
    const dash    = isClosed ? '4,3' : (walletIntel.has(n.address) && !n.isSeed ? '3,2' : 'none')
    const strokeColor = isClosed ? '#FF5C5C' : stroke
    const opacity = isClosed ? 0.55 : (n.layer >= 99 ? 0.4 : 1)

    if (kind === 'pool' || kind === 'bridge') {
      // Diamond ◇
      const d = r * 1.2
      sel.append('path').attr('d', `M0,${-d}L${d},0L0,${d}L${-d},0Z`)
        .attr('fill', fill).attr('stroke', strokeColor).attr('stroke-width', strokeW)
        .attr('stroke-dasharray', dash).attr('fill-opacity', opacity)
    } else if (kind === 'cex') {
      // Square ▢
      const d = r * 1.05
      sel.append('rect').attr('x', -d).attr('y', -d).attr('width', d*2).attr('height', d*2)
        .attr('fill', fill).attr('stroke', strokeColor).attr('stroke-width', strokeW)
        .attr('stroke-dasharray', dash).attr('fill-opacity', opacity)
    } else if (kind === 'mixer') {
      // Triangle (down-pointing) ▽
      const d = r * 1.25
      sel.append('path').attr('d', `M0,${d}L${d},${-d*0.7}L${-d},${-d*0.7}Z`)
        .attr('fill', fill).attr('stroke', strokeColor).attr('stroke-width', strokeW)
        .attr('stroke-dasharray', dash).attr('fill-opacity', opacity)
    } else {
      // Default: circle (seed + regular wallets)
      sel.append('circle').attr('r', r)
        .attr('fill', fill).attr('stroke', strokeColor).attr('stroke-width', strokeW)
        .attr('stroke-dasharray', dash).attr('fill-opacity', opacity)
    }
  })

  // Labels: only the ones an analyst actually needs to read at a glance.
  // Seed + nodes that carry an identity worth showing (static entity label
  // like Binance / stake.com, SNS .sol domain, whale, mixer, CEX-like…).
  // Everything else stays unlabeled by default — hover/click reveals the
  // full address in the tooltip and sidebar. Cuts the 8-label pile-up at
  // the top of the layer-1 cluster down to the 2-3 that matter.
  function shouldLabel(n) {
    if (n.isSeed) return true
    const i = walletIntel.get(n.address)
    if (!i) return false
    if (i.staticLabel) return true   // stake.com / Binance / SNS-inferred
    const FEAT = ['cex-like', 'mixer-like', 'whale', 'high-fan-in', 'scatter']
    return (i.behaviorTags || []).some(t => FEAT.includes(t))
  }
  function labelText(n) {
    const i = walletIntel.get(n.address)
    if (i?.staticLabel?.name) return i.staticLabel.name   // "stake.com", "Binance"
    return n.label   // fall back to short address
  }
  nodeEls.filter(shouldLabel).append('text')
    .attr('dy', n => (n.isSeed ? 14 : 9) + 11)
    .attr('text-anchor', 'middle').attr('fill', '#A8A8A6')
    .attr('font-family', '"JetBrains Mono",monospace').attr('font-size', 10)
    .attr('font-weight', n => n.isSeed || walletIntel.get(n.address)?.staticLabel ? 600 : 400)
    .attr('pointer-events', 'none')
    .text(labelText)

  // ── Live tick: while the sim is still cooling (after pre-tick we restart at
  // low alpha so dragging stays bouncy), the on('tick') handler keeps node
  // transforms and edge paths in sync. Once alpha drops below alphaMin, sim
  // stops on its own — no perpetual rAF burn.
  function paintTick() {
    nodeEls.attr('transform', n => `translate(${n.x},${n.y})`)
    linkPaths.attr('d', edgePath)
  }
  sim.on('tick', paintTick)
  // Kick off the post-pre-tick "settle" phase so the layout breathes for a beat
  // before fully cooling. Higher alpha for smaller graphs gives a more obvious
  // springy feel; bigger graphs settle faster to avoid jank.
  sim.alpha(N > 80 ? 0.08 : 0.2).restart()

  // Initial camera: fit all visible nodes into the viewport with a small
  // margin. Without this, the simulation centers at (W/2,H/2) but its actual
  // node spread can be much wider/narrower than the SVG, so the user lands on
  // a tightly-zoomed cluster around the seed and has to manually zoom out.
  // Computed from current node positions (already post-pre-tick, so reflects
  // the real layout extent).
  {
    let minX = +Infinity, minY = +Infinity, maxX = -Infinity, maxY = -Infinity
    for (const n of allNodes) {
      if (n.x < minX) minX = n.x
      if (n.y < minY) minY = n.y
      if (n.x > maxX) maxX = n.x
      if (n.y > maxY) maxY = n.y
    }
    if (isFinite(minX)) {
      const margin = 60
      const spanW = Math.max(maxX - minX, 1) + margin * 2
      const spanH = Math.max(maxY - minY, 1) + margin * 2
      const k     = Math.min(W / spanW, H / spanH, 1.4)   // never zoom IN past 1.4
      const cxF   = (minX + maxX) / 2
      const cyF   = (minY + maxY) / 2
      svg.call(zoom.transform, d3.zoomIdentity.translate(W / 2 - k * cxF, H / 2 - k * cyF).scale(k))
    }
  }

  // Cache positions so re-renders preserve layout across filter changes.
  sim.on('end', () => {
    for (const n of allNodes) _simPos.set(n.address, { x: n.x, y: n.y })
  })

  // ── Legend ─────────────────────────────────────────────────────────────────
  const layerLabel = l => l === 0 ? '种子' : `第 ${l} 跳`
  const presentLayers = new Set(allNodes.map(n => n.layer))
  const presentTracked = [...presentLayers].filter(l => l < 99).sort((a,b) => a-b)
  const hasExternal   = presentLayers.has(99)
  const legend = svg.append('g').attr('transform', 'translate(16,16)')
  let li = 0
  for (const l of presentTracked) {
    const row = legend.append('g').attr('transform', `translate(0,${li*20})`)
    row.append('circle').attr('r', 5).attr('cx', 6).attr('fill', LAYER_COLORS[Math.min(l, LAYER_COLORS.length-1)])
    row.append('text').attr('x', 16).attr('y', 4).attr('fill', 'rgba(245,245,245,0.40)')
      .attr('font-family', '"JetBrains Mono",monospace').attr('font-size', 10).text(layerLabel(l))
    li++
  }
  if (hasExternal && showExternal) {
    const row = legend.append('g').attr('transform', `translate(0,${li*20})`)
    row.append('circle').attr('r', 4).attr('cx', 6).attr('fill', LAYER_COLORS[4]).attr('fill-opacity', 0.5)
    row.append('text').attr('x', 16).attr('y', 4).attr('fill', 'rgba(245,245,245,0.40)')
      .attr('font-family', '"JetBrains Mono",monospace').attr('font-size', 10).text('外部节点')
    li++
  }
  // Shape legend: helps the user decode pool diamonds, CEX squares, etc.
  const shapeRows = []
  if ([...hotWallets].some(a => nodeByAddr.has(a))) shapeRows.push({ shape: 'diamond', color: '#A78BFA', label: '◆ 池子 / 高频' })
  if (allNodes.some(n => nodeKind(n) === 'cex'))   shapeRows.push({ shape: 'square',  color: '#6B9BFF', label: '■ CEX 交易所' })
  if (allNodes.some(n => nodeKind(n) === 'mixer')) shapeRows.push({ shape: 'triangle', color: '#FF5C5C', label: '▽ 混币器' })
  for (const r of shapeRows) {
    const row = legend.append('g').attr('transform', `translate(0,${li*20})`)
    // Use a text glyph for the shape icon to keep this simple — actual nodes use SVG shapes.
    row.append('text').attr('x', 0).attr('y', 5).attr('fill', r.color)
      .attr('font-family', '"JetBrains Mono",monospace').attr('font-size', 11).text(r.label)
    li++
  }

  // Click on SVG background: deselect + clear dimming.
  svg.on('click', () => {
    closeNodeDetail()
    nodeEls.classed('selected', false).style('opacity', 1)
    linkPaths.classed('dim', false).classed('bright', false)
  })
}

// ── Transfer Snapshot Save / Load ─────────────────────────────────────────────
let transferHistoryOpen = false

async function saveScan() {
  if (!scanGraph) return
  const note = prompt('Optional label:', '')
  if (note === null) return
  // Persist wallet intel alongside the graph. Without it, loading a snapshot
  // strips all 行为标签 / 风险评分 / 实体银行身份 and the sidebar shows only
  // the basic edge counts. Same for hotWallets — needed for the purple-diamond
  // skip-expand markers in the graph.
  const body = {
    wallets: currentScanWallets, graph: scanGraph, prices: Object.fromEntries(tokenPrices),
    intel: Object.fromEntries(walletIntel),
    hotWallets: [...hotWallets],
    note: note || undefined,
  }
  const res = await fetch('/api/transfer-snapshots', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
  if (res.ok) {
    const btn = document.getElementById('btnSaveScan')
    const prev = btn.textContent; btn.textContent = '✓ Saved'
    setTimeout(() => btn.textContent = prev, 2000)
  }
}

function toggleTransferHistory() {
  transferHistoryOpen = !transferHistoryOpen
  const panel = document.getElementById('transferHistoryPanel')
  if (transferHistoryOpen) { loadTransferHistory(); panel.style.display = '' }
  else panel.style.display = 'none'
}

document.addEventListener('click', e => {
  if (!transferHistoryOpen) return
  const panel = document.getElementById('transferHistoryPanel')
  const btn   = document.getElementById('btnTransferHistory')
  if (panel && btn && !panel.contains(e.target) && !btn.contains(e.target)) {
    panel.style.display = 'none'; transferHistoryOpen = false
  }
})

async function loadTransferHistory() {
  const panel = document.getElementById('transferHistoryPanel')
  panel.innerHTML = '<div class="hist-empty">Loading&hellip;</div>'
  const snaps = await fetch('/api/transfer-snapshots').then(r => r.json()).catch(() => [])
  if (!snaps.length) { panel.innerHTML = '<div class="hist-empty">NO SAVED SCANS YET</div>'; return }
  panel.innerHTML = snaps.map(s => {
    const dt  = new Date(s.savedAt)
    const str = dt.toLocaleString('en-US', { month:'short', day:'numeric', year:'2-digit', hour:'2-digit', minute:'2-digit' })
    const w   = (s.wallets ?? []).map(a => a.slice(0,6)+'&hellip;').join(', ')
    return `<div class="hist-item" onclick="loadTransferScan('${s.filename}')">
      <div class="hist-meta">
        <div class="hist-time">${str}</div>
        <div class="hist-sub">${w} &middot; ${s.nodeCount} nodes${s.note ? ' &middot; ' + s.note : ''}</div>
      </div>
      <button class="hist-del" onclick="deleteTransferScan(event,'${s.filename}')" title="Delete">✕</button>
    </div>`
  }).join('')
}

async function loadTransferScan(filename) {
  const snap = await fetch(`/api/transfer-snapshots/${filename}`).then(r => r.json()).catch(() => null)
  if (!snap) return
  scanGraph = snap.graph
  tokenPrices = snap.prices ? new Map(Object.entries(snap.prices)) : new Map()
  okxDataMap = new Map(); suspects = []; currentScanWallets = snap.wallets ?? []
  walletIntel = snap.intel ? new Map(Object.entries(snap.intel)) : new Map()
  hotWallets  = snap.hotWallets ? new Set(snap.hotWallets) : new Set()

  // Recover the scan parameters from the saved graph so the recap bar reads
  // accurately. Depth is the deepest tracked layer (ignoring 99 externals);
  // the date range comes from the graph's actual timeRange.
  const layers = scanGraph.nodes.map(n => n.layer).filter(l => l < 99)
  scanDepth = layers.length ? Math.max(...layers) : 1
  document.querySelectorAll('.depth-btn').forEach(b => b.classList.toggle('active', +b.dataset.d === scanDepth))
  if (scanGraph.timeRange) {
    const iso = ts => new Date(ts * 1000).toISOString().slice(0, 10)
    document.getElementById('fromInput').value = iso(scanGraph.timeRange.min)
    document.getElementById('toInput').value   = iso(scanGraph.timeRange.max)
  }
  if (currentScanWallets.length) document.getElementById('walletInput').value = currentScanWallets.join('\n')

  document.getElementById('transferHistoryPanel').style.display = 'none'
  transferHistoryOpen = false
  document.getElementById('btnSaveScan').style.display = ''
  initView()
}

async function deleteTransferScan(e, filename) {
  e.stopPropagation()
  if (!confirm('Delete this scan?')) return
  await fetch(`/api/transfer-snapshots/${filename}`, { method: 'DELETE' })
  loadTransferHistory()
}

// ── Edge filtering ────────────────────────────────────────────────────────────
const WSOL_MINT = 'So11111111111111111111111111111111111111112'
const STABLE_MINTS_FE = new Set([
  'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v',
  'Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB',
  'USDSwr9ApdHk5bvJKMjzff41FfuX8bSxdKcR81vTwcA',
])

// Real-spot USD value for a transfer. SOL pulls the wSOL DexScreener price
// captured at scan time (the back end mirrors wSOL → 'SOL' sentinel in
// tokenPrices). The 150 fallback only kicks in when DexScreener failed for
// both keys, so most scans now report accurate values regardless of the
// market-day price of SOL.
function edgeUsdEstimate(mint, symbol, amount) {
  if (mint === 'SOL' || mint === WSOL_MINT) {
    const info = tokenPrices.get('SOL') || tokenPrices.get(WSOL_MINT)
    return info ? amount * info.price : amount * 150
  }
  if (STABLE_MINTS_FE.has(mint)) return amount
  const info = tokenPrices.get(mint)
  if (info) return amount * info.price
  const tm = scanGraph?.targetMint
  if (tm && mint === tm) return amount * (targetPrice || 0.001)
  return 0
}

// Symbol lookup for display. Underlying state (filterMints, edge keys, copy
// buttons) still uses mint — this is presentation only.
function symbolForMint(mint) {
  if (mint === 'SOL' || mint === WSOL_MINT) return 'SOL'
  if (mint === 'EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v') return 'USDC'
  if (mint === 'Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB') return 'USDT'
  if (mint === 'USDSwr9ApdHk5bvJKMjzff41FfuX8bSxdKcR81vTwcA') return 'USDS'
  const info = tokenPrices.get(mint)
  if (info?.symbol) return info.symbol
  // Try to recover symbol from a transfer record (server-side helius.ts populates
  // this for known mints; falls back to mint slice when unknown).
  const t = scanGraph?.transfers.find(x => x.mint === mint)
  if (t?.symbol && !t.symbol.endsWith('…')) return t.symbol
  return mint.slice(0, 4) + '…'
}

function getFilteredEdges() {
  if (!scanGraph) return []
  const { from, to } = getRange()
  const minUsd = parseFloat(document.getElementById('minUsdInput')?.value) || 0
  const map = new Map()
  for (const t of scanGraph.transfers) {
    if (t.timestamp < from || t.timestamp > to) continue
    if (filterMints.size && !filterMints.has(t.mint)) continue
    const [a, b, sign] = t.from < t.to ? [t.from, t.to, 1] : [t.to, t.from, -1]
    const key = `${a}|${b}|${t.mint}`
    const ex  = map.get(key)
    if (ex) { ex.flow += t.amount * sign; ex.usdFlow += edgeUsdEstimate(t.mint, t.symbol, t.amount); ex.txCount++ }
    else map.set(key, { a, b, mint: t.mint, symbol: t.symbol, flow: t.amount * sign, usdFlow: edgeUsdEstimate(t.mint, t.symbol, t.amount), txCount: 1 })
  }
  return [...map.values()]
    .filter(e => Math.abs(e.flow) > 0)
    .filter(e => !hideUnpriced || e.usdFlow > 0)
    .filter(e => minUsd <= 0 || e.usdFlow >= minUsd)
    .map(e => ({
      source: e.flow >= 0 ? e.a : e.b,
      target: e.flow >= 0 ? e.b : e.a,
      mint: e.mint, symbol: e.symbol, amount: Math.abs(e.flow), usdScore: e.usdFlow, txCount: e.txCount
    }))
}

// ── Net Flow Table ────────────────────────────────────────────────────────────
function renderTable() {
  if (!scanGraph) return
  const { from, to } = getRange()
  const minUsd  = parseFloat(document.getElementById('minUsdInput')?.value) || 0
  // Default view is now "address × seed relationship" — the per-token
  // breakdown is a secondary mode behind a toggle. An analyst looking at
  // the table wants to answer "who is the most connected to my target?",
  // not "how much USDC moved on average". The per-token view is still
  // useful for forensics; we expose both.
  const breakdownMode = window._netFlowMode === 'token'
  const symSet = new Set(), symbolToMints = new Map(), flows = new Map()

  for (const t of scanGraph.transfers) {
    if (t.timestamp < from || t.timestamp > to) continue
    if (filterMints.size && !filterMints.has(t.mint)) continue
    const usd = edgeUsdEstimate(t.mint, t.symbol, t.amount)
    // Mirror the graph view's filters: unpriced toggle, then Min $ Value cutoff.
    if (hideUnpriced && usd <= 0) continue
    if (minUsd > 0 && usd < minUsd) continue
    const sym = symbolForMint(t.mint)
    symSet.add(sym)
    if (!symbolToMints.has(sym)) symbolToMints.set(sym, new Set())
    symbolToMints.get(sym).add(t.mint)
    ;[{a:t.to,dir:'in'},{a:t.from,dir:'out'}].forEach(({a,dir}) => {
      if (!flows.has(a)) flows.set(a, {})
      const nf = flows.get(a)
      if (!nf[sym]) nf[sym] = { in:0, out:0 }
      nf[sym][dir] += t.amount
    })
  }

  // Sort symbols by total USD flow so dominant tokens come first.
  const symFlowUsd = new Map()
  for (const sym of symSet) {
    let usd = 0
    for (const nf of flows.values()) {
      const f = nf[sym]
      if (!f) continue
      const mint = [...symbolToMints.get(sym)][0]
      usd += edgeUsdEstimate(mint, sym, f.in + f.out)
    }
    symFlowUsd.set(sym, usd)
  }
  const symbols = [...symSet].sort((a, b) => (symFlowUsd.get(b) ?? 0) - (symFlowUsd.get(a) ?? 0))
  const nodeMap = new Map(scanGraph.nodes.map(n => [n.address, n]))

  // Mode toggle controls — rendered above the table head so the user can
  // switch between "对种子关系" (default) and "按代币拆" (legacy / forensics).
  const headEl = document.getElementById('flowHead')
  const modeToggle = `<tr><th colspan="99" style="padding:6px 14px;border-bottom:1px solid var(--border);background:var(--surface)">
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:0.08em;margin-right:8px">视图</span>
    <button class="net-flow-mode-btn ${!breakdownMode ? 'active' : ''}" onclick="window._netFlowMode='seed';renderTable()"
      style="font-family:var(--font-mono);font-size:10px;padding:3px 10px;border:1px solid var(--border);background:transparent;color:${!breakdownMode ? 'var(--signal)' : 'var(--ink-3)'};border-color:${!breakdownMode ? 'var(--signal)' : 'var(--border)'};cursor:pointer;margin-right:4px">与种子的关系</button>
    <button class="net-flow-mode-btn ${breakdownMode ? 'active' : ''}" onclick="window._netFlowMode='token';renderTable()"
      style="font-family:var(--font-mono);font-size:10px;padding:3px 10px;border:1px solid var(--border);background:transparent;color:${breakdownMode ? 'var(--signal)' : 'var(--ink-3)'};border-color:${breakdownMode ? 'var(--signal)' : 'var(--border)'};cursor:pointer">按代币拆</button>
  </th></tr>`

  if (breakdownMode) {
    // ── Legacy per-token view ───────────────────────────────────────────────
    headEl.innerHTML = modeToggle +
      `<tr><th>地址</th><th>位置</th>${symbols.map(s => {
        const mints = [...(symbolToMints.get(s) ?? [])]
        const title = mints.length > 1 ? `${s} (${mints.length} mints)` : mints[0] ?? s
        return `<th title="${title}">${s} 入</th><th title="${title}">${s} 出</th><th title="${title}">${s} 净</th>`
      }).join('')}</tr>`

    const rows = [...flows.entries()].map(([addr, nf]) => {
      const nd  = nodeMap.get(addr) ?? { layer: 99, isSeed: false }
      const tot = symbols.reduce((s,sym) => s + Math.abs((nf[sym]?.in??0)-(nf[sym]?.out??0)), 0)
      return { addr, nf, nd, tot }
    }).sort((a,b) => b.tot - a.tot)

    document.getElementById('flowBody').innerHTML = rows.map(({addr,nf,nd}) => {
      const col = LAYER_COLORS[Math.min(nd.layer, LAYER_COLORS.length-1)]
      const cells = symbols.map(sym => {
        const f = nf[sym] ?? {in:0,out:0}
        const net = f.in - f.out
        const cls = net > 0.001 ? 'pos' : net < -0.001 ? 'neg' : 'zero'
        return `<td class="pos">${fmtN(f.in)}</td><td class="neg">${fmtN(f.out)}</td><td class="${cls}">${net>=0?'+':''}${fmtN(net)}</td>`
      }).join('')
      const layerLabel = nd.isSeed ? '种子' : nd.layer === 99 ? '外部' : `${nd.layer} 跳`
      return `<tr><td><span class="dot" style="background:${col}"></span>${addr.slice(0,6)}…${addr.slice(-4)}</td><td>${layerLabel}</td>${cells}</tr>`
    }).join('')
    return
  }

  // ── Default view: address × seed relationship ────────────────────────────
  // Columns: 地址 / 实体 / 层 / $从种子 / $给种子 / 净 / 直连笔数 / 首末时间 / 行为
  const seedRel = scanGraph.seedRelation ?? {}
  const fmtDateShort = ts => ts ? new Date(ts*1000).toLocaleDateString('zh-CN', { month: 'numeric', day: 'numeric' }) : '—'
  headEl.innerHTML = modeToggle +
    `<tr>
      <th>地址</th>
      <th>实体 / 标签</th>
      <th>层</th>
      <th title="从种子收到">$ 收</th>
      <th title="送给种子">$ 送</th>
      <th title="对种子净流，正=种子流入此地址">净</th>
      <th title="直连转账笔数">笔</th>
      <th title="首次互动 → 末次互动">时间</th>
    </tr>`

  // Sort by |direct net + indirect total| — addresses with the most
  // money moved against the seed surface first.
  const rows = scanGraph.nodes
    .filter(n => !n.isSeed)
    .map(n => {
      const rel = seedRel[n.address] ?? {directInUsd:0,directOutUsd:0,directTxCount:0,indirectInUsd:0,indirectOutUsd:0,firstTs:null,lastTs:null,hopDistance:Infinity}
      const direct = rel.directInUsd + rel.directOutUsd
      const indirect = rel.indirectInUsd + rel.indirectOutUsd
      const sortKey = direct * 2 + indirect   // direct counts double
      return { n, rel, sortKey, direct, indirect }
    })
    .sort((a,b) => b.sortKey - a.sortKey)

  document.getElementById('flowBody').innerHTML = rows.map(({n, rel}) => {
    const col       = LAYER_COLORS[Math.min(n.layer, LAYER_COLORS.length-1)]
    const intel     = walletIntel.get(n.address)
    const entity    = intel?.staticLabel ? `<span style="color:${entityColor(intel.staticLabel.type)};font-family:var(--font-mono);font-size:10px;font-weight:600">${intel.staticLabel.name}</span>`
                    : intel?.behaviorTags?.length ? `<span style="color:var(--muted);font-family:var(--font-mono);font-size:10px">${intel.behaviorTags.slice(0,2).join(', ')}</span>`
                    : '<span style="color:var(--subtle);font-size:10px">—</span>'
    const layerLab  = n.layer === 99 ? '外部' : `${n.layer} 跳`
    const netUsd    = rel.directInUsd - rel.directOutUsd
    const netCls    = netUsd > 0.5 ? 'pos' : netUsd < -0.5 ? 'neg' : 'zero'
    const netStr    = rel.directTxCount === 0 && rel.indirectInUsd + rel.indirectOutUsd > 0
                    ? `<span style="color:var(--subtle)">间接 ${fmtN(rel.indirectInUsd + rel.indirectOutUsd)}</span>`
                    : `<span class="${netCls}">${netUsd >= 0 ? '+' : ''}${fmtN(netUsd)}</span>`
    const inStr     = rel.directInUsd  > 0 ? `<span class="pos">${fmtN(rel.directInUsd)}</span>`  : '<span style="color:var(--subtle)">—</span>'
    const outStr    = rel.directOutUsd > 0 ? `<span class="neg">${fmtN(rel.directOutUsd)}</span>` : '<span style="color:var(--subtle)">—</span>'
    const timeStr   = rel.firstTs ? `<span style="font-size:10px;color:var(--muted)">${fmtDateShort(rel.firstTs)} → ${fmtDateShort(rel.lastTs)}</span>` : '<span style="color:var(--subtle)">—</span>'

    return `<tr style="cursor:pointer" onclick="(()=>{const ns=document.querySelectorAll('#mainSvg g.node');for(const g of ns){if(d3.select(g).datum()?.address==='${n.address}'){setView('graph');setTimeout(()=>g.dispatchEvent(new MouseEvent('click',{bubbles:true})),50);return;}}})()">
      <td><span class="dot" style="background:${col}"></span>${n.address.slice(0,6)}…${n.address.slice(-4)}</td>
      <td>${entity}</td>
      <td><span style="color:var(--muted);font-size:11px">${layerLab}</span></td>
      <td>${inStr}</td>
      <td>${outStr}</td>
      <td>${netStr}</td>
      <td><span style="font-variant-numeric:tabular-nums">${rel.directTxCount}</span></td>
      <td>${timeStr}</td>
    </tr>`
  }).join('')
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmtDate(ms) {
  return new Date(ms).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' })
}
function fmtN(n) {
  if (!n || !isFinite(n)) return '0'
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2)+'M'
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(2)+'K'
  return n.toFixed(2)
}

// Display a USD price suitable for token chips and tooltips. Distinct from fmtN
// because sub-cent meme tokens routinely have prices like 0.0000023 — fmtN's
// .toFixed(2) would render those as "0.00" which loses signal. We use 3 sig
// figs of scientific notation in lowercase (looks neater than 6.50E-6) for
// anything under $0.001, and normal precision above.
function fmtPrice(p) {
  if (!isFinite(p) || p <= 0) return '$0'
  if (p < 0.001) {
    // 2 sig figs after the leading digit — e.g. 0.0000234 → $2.3e-5
    const exp = Math.floor(Math.log10(p))
    const mantissa = p / Math.pow(10, exp)
    return `$${mantissa.toFixed(1)}e${exp}`
  }
  if (p < 1)     return '$' + p.toFixed(4).replace(/0+$/, '').replace(/\.$/, '')
  if (p < 1000)  return '$' + p.toFixed(2)
  return '$' + fmtN(p)
}
</script>
</body>
